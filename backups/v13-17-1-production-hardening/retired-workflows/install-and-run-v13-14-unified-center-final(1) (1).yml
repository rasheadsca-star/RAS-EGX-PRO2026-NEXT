name: Install & Run V13.14.1 Stable Repair

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - intraday
          - postclose
          - install_only
  push:
    paths:
      - ".github/workflows/install-and-run-v13-14-unified-center-final.yml"
  schedule:
    # Broad UTC window; Cairo-time logic below selects the correct mode.
    - cron: "*/15 6-18 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-v13-14-1-stable-repair
  cancel-in-progress: true

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install or refresh V13.14 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          from pathlib import Path
          import shutil
          payload = ''
          allowed = ['scripts/postclose/v13-14-session-finalizer.cjs', 'scripts/quant/v13-14-unified-center.cjs', 'scripts/quant/v13-14-acceptance.cjs', 'data/v13-14-unified-center-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/unified-decision-center.html']
          backup_root = Path('backups/v13-14-1-stable-repair')
          marker = backup_root / 'BACKUP_COMPLETE.txt'
          if not marker.exists():
              for rel in allowed:
                  source = Path(rel)
                  if source.exists():
                      target = backup_root / rel
                      target.parent.mkdir(parents=True, exist_ok=True)
                      shutil.copy2(source, target)
              marker.parent.mkdir(parents=True, exist_ok=True)
              marker.write_text('Original V13.14 files before V13.14.1 stable repair.\n', encoding='utf-8')
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected archive members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate V13.14.1 patch files
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/postclose/v13-14-session-finalizer.cjs
          node --check scripts/quant/v13-14-unified-center.cjs
          node --check scripts/quant/v13-14-acceptance.cjs
          python3 - <<'PY'
          import re
          from pathlib import Path
          for source, target in [
              ('preview-v13/app/index.html', '/tmp/v13141-index.js'),
              ('preview-v13/app/unified-decision-center.html', '/tmp/v13141-center.js')
          ]:
              text = Path(source).read_text(encoding='utf-8')
              scripts = re.findall(r'<script>([\s\S]*?)</script>', text)
              if not scripts:
                  raise SystemExit(f'No inline script in {source}')
              Path(target).write_text(scripts[-1], encoding='utf-8')
          PY
          node --check /tmp/v13141-index.js
          node --check /tmp/v13141-center.js
          grep -q 'V13.14.1' preview-v13/app/index.html
          grep -q 'sessionIntegrityNotice' preview-v13/app/index.html
          grep -q 'دعم تاريخي 20 جلسة' preview-v13/app/unified-decision-center.html
          grep -q "patchVersion: '13.14.1'" scripts/quant/v13-14-unified-center.cjs
          echo 'V13.14.1 PATCH VALIDATION PASSED'

      - name: Resolve Cairo mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_MODE: ${{ inputs.mode || 'auto' }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const parts = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Africa/Cairo', weekday: 'long',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', hourCycle: 'h23'
          }).formatToParts(new Date()).reduce((a,x)=>(a[x.type]=x.value,a),{});
          const minute = Number(parts.hour) * 60 + Number(parts.minute);
          const tradingDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday'].includes(parts.weekday);
          const intraday = tradingDay && minute >= 9*60+45 && minute <= 14*60+45;
          const postclose = tradingDay && minute >= 15*60 && minute <= 20*60+30;
          let requested = String(process.env.REQUESTED_MODE || 'auto').toLowerCase();
          let mode;
          if (process.env.EVENT_NAME === 'schedule') {
            mode = intraday ? 'intraday' : postclose ? 'postclose' : 'skip';
          } else if (requested !== 'auto') {
            mode = requested;
          } else {
            mode = intraday ? 'intraday' : postclose ? 'postclose' : 'install_only';
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `mode=${mode}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `cairo_date=${parts.year}-${parts.month}-${parts.day}\n`);
          console.log({ cairo: `${parts.weekday} ${parts.hour}:${parts.minute}`, tradingDay, intraday, postclose, mode });
          NODE

      - name: Validate V13.14 dependencies
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/collect-market-gateway.js
            scripts/history/v13-10-full-market-refresh.cjs
            scripts/history/history-summary-builder.cjs
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-9-recommendation-audit.cjs
            scripts/quant/v13-10-tiered-confidence.cjs
            scripts/quant/v13-7-stock-intelligence.cjs
            scripts/quant/v13-8-portfolio-risk.cjs
            scripts/quant/v13-11-daily-decision.cjs
            scripts/intraday/v13-12-intraday-monitor.cjs
            scripts/quant/v13-13-live-rerank.cjs
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            data/v13-14-unified-center-policy.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Refresh public market snapshot
        if: steps.mode.outputs.mode == 'intraday' || steps.mode.outputs.mode == 'postclose'
        env:
          EGX_FETCH_TIMEOUT_MS: "360000"
          EGX_SOURCE_FETCH_TIMEOUT_MS: "45000"
          EGX_GATEWAY_FULL_ROWS: "180"
          EGX_GATEWAY_CONDITIONAL_ROWS: "100"
        run: node scripts/collect-market-gateway.js

      - name: Intraday monitoring and unified decision
        if: steps.mode.outputs.mode == 'intraday'
        run: |
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INTRADAY node scripts/quant/v13-14-acceptance.cjs

      - name: First post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose'
        id: final1
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Refresh full historical universe after incomplete coverage
        if: steps.mode.outputs.mode == 'postclose' && steps.final1.outcome == 'failure'
        id: history_refresh
        continue-on-error: true
        env:
          V13_10_SKIP_FETCH: "false"
        run: node scripts/history/v13-10-full-market-refresh.cjs

      - name: Second post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose' && steps.final1.outcome == 'failure'
        id: final2
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Resolve finalization result
        if: steps.mode.outputs.mode == 'postclose'
        id: final_status
        shell: bash
        env:
          FINAL1: ${{ steps.final1.outcome }}
          FINAL2: ${{ steps.final2.outcome }}
        run: |
          if [ "$FINAL1" = "success" ] || [ "$FINAL2" = "success" ]; then
            echo "finalized=true" >> "$GITHUB_OUTPUT"
          else
            echo "finalized=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Finalized: $(tail -1 "$GITHUB_OUTPUT")"

      - name: Rebuild confirmed daily decision pipeline
        if: steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized == 'true'
        run: |
          node scripts/history/history-summary-builder.cjs
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-10-tiered-confidence.cjs
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs
          node scripts/quant/v13-11-daily-decision.cjs
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=POSTCLOSE_CONFIRMED node scripts/quant/v13-14-acceptance.cjs

      - name: Publish provisional center when finalization is pending
        if: steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized != 'true'
        run: |
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=PROVISIONAL node scripts/quant/v13-14-acceptance.cjs
          echo "Post-close coverage is still incomplete; V13.14 published a clearly labeled provisional decision instead of stale data presented as current."

      - name: Build initial unified center after installation
        if: steps.mode.outputs.mode == 'install_only'
        run: |
          if [ -f data/intraday/latest.json ] && [ -f data/quant/daily-decision-workspace-v13-11.json ]; then
            node scripts/quant/v13-13-live-rerank.cjs || true
          fi
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INSTALL node scripts/quant/v13-14-acceptance.cjs

      - name: Preserve existing V13 structure
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          echo "V13.14.1 stable repair does not delete previous V13 pages, data layers, or workflows."
          echo "Only the six V13.14 target files are patched; the original copies are stored under backups/v13-14-1-stable-repair/."

      - name: Confirm stable V11 isolation
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1314-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v1314-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.14 files and outputs
        if: steps.mode.outputs.mode != 'skip'
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths=(
            .github/workflows
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            data/v13-14-unified-center-policy.json
            data/history
            data/history-summary.json
            data/history-last-run.json
            data/history-batch-state.json
            data/history-errors.json
            data/source-audit.json
            data/session-calendar.json
            data/corporate-actions.json
            data/market.json
            data/last-good-market.json
            data/source-health.json
            data/source-fetch-report.json
            data/fetch-status.json
            data/source-gateway-report.json
            data/source-alerts.json
            data/intraday
            data/postclose
            data/quant
            preview-v13/app/index.html
            preview-v13/app/unified-decision-center.html
            backups/v13-14-1-stable-repair
          )
          for item in "${paths[@]}"; do
            if [ -e "$item" ]; then git add "$item"; else echo "Skipping missing optional path: $item"; fi
          done
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No V13.14 changes to commit."
          else
            git commit -m "Apply V13.14.1 stable repair without changing structure"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Pages
        if: steps.mode.outputs.mode != 'skip'
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        if: steps.mode.outputs.mode != 'skip'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.14.1 attempt 1
        if: steps.mode.outputs.mode != 'skip'
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 2
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy V13.14.1 attempt 2
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 3
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180

      - name: Deploy V13.14.1 attempt 3
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deploy3
        uses: actions/deploy-pages@v4
