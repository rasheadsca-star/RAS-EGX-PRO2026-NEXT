<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>EGX Pro V13.3 — مركز القرار اليومي الموحد</title>
  <style>
    :root{color-scheme:dark;--bg:#06121f;--panel:#0b2035;--panel2:#0e2943;--line:#275170;--text:#ecf7ff;--muted:#9bc0d8;--green:#2ed88f;--blue:#29b6f6;--amber:#ffc857;--red:#ff667a}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#04101b,#071b2d);color:var(--text);font-family:Tahoma,Arial,sans-serif}
    a{color:inherit;text-decoration:none}.wrap{max-width:1440px;margin:auto;padding:18px}.hero,.section{background:rgba(11,32,53,.96);border:1px solid var(--line);border-radius:18px;margin-bottom:14px}
    .hero{padding:18px;display:flex;align-items:center;justify-content:space-between;gap:16px}.hero h1{font-size:24px;margin:0 0 8px}.sub{color:var(--muted);font-size:13px;line-height:1.8}
    .actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid #3f789c;background:#0e2943;padding:9px 13px;border-radius:10px;cursor:pointer;font-weight:bold}.btn:hover{background:#123653}
    .status{padding:16px 18px;font-size:20px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;gap:12px}.status small{font-size:13px;color:var(--muted);font-weight:normal}
    .good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}.info{color:var(--blue)}
    .cards{display:grid;grid-template-columns:repeat(6,minmax(150px,1fr));gap:10px;padding:14px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px;min-height:102px}
    .card .label{color:var(--muted);font-size:12px}.card .value{font-size:28px;font-weight:bold;margin-top:12px}.card .note{color:var(--muted);font-size:11px;margin-top:7px}
    .tabs{display:flex;gap:7px;flex-wrap:wrap;padding:12px;border-bottom:1px solid var(--line)}.tab{border:1px solid var(--line);background:#071a2c;color:var(--text);border-radius:9px;padding:8px 12px;cursor:pointer}.tab.active{background:#134365;border-color:#51a7d2}
    .pane{display:none;padding:14px}.pane.active{display:block}.grid{display:grid;grid-template-columns:repeat(3,minmax(250px,1fr));gap:10px}
    .candidate{background:#081b2d;border:1px solid var(--line);border-radius:13px;padding:14px}.candidate h3{margin:0 0 8px;font-size:19px}.ticker{color:var(--blue);font-weight:bold}.tags{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
    .tag{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#0d2942}.numbers{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}.num{padding:8px;background:#0c263d;border-radius:8px;font-size:12px}.num strong{display:block;font-size:15px;margin-top:4px}
    table{width:100%;border-collapse:collapse;background:#081b2d;border-radius:12px;overflow:hidden}th,td{padding:10px;border-bottom:1px solid #183b55;text-align:right;font-size:12px}th{color:#bfe5f8;background:#0d2942}
    .stage{display:flex;align-items:center;justify-content:space-between;padding:12px;border-bottom:1px solid #183b55}.stage:last-child{border:0}.dot{width:11px;height:11px;border-radius:50%;display:inline-block;margin-left:8px}.passed{background:var(--green)}.blocked{background:var(--red)}.warning{background:var(--amber)}
    .empty{color:var(--muted);padding:30px;text-align:center}.footer{color:var(--muted);font-size:11px;line-height:1.8;padding:14px}.loading{padding:60px;text-align:center;color:var(--muted)}
    @media(max-width:1050px){.cards{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){.wrap{padding:8px}.hero{align-items:flex-start;flex-direction:column}.cards{grid-template-columns:repeat(2,1fr);padding:8px}.grid{grid-template-columns:1fr}.card .value{font-size:22px}table{display:block;overflow:auto}}
  </style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <div><h1>EGX Pro V13.3 — مركز القرار اليومي الموحد</h1><div class="sub">تشغيل إنتاجي من الأحد إلى الخميس • أهلية تاريخية صارمة • تداول ورقي وقياس نتائج • التنفيذ الحقيقي مغلق</div></div>
    <div class="actions"><button class="btn" onclick="loadData()">تحديث</button><a class="btn" href="../">التطبيق المستقر</a><a class="btn" href="../preview-v12/history-eligibility.html">تفاصيل الأهلية</a><a class="btn" href="../preview-v12/decision-paper-v13-2.html">تفاصيل التداول الورقي</a></div>
  </header>
  <main id="app"><div class="section loading">جارٍ تحميل بيانات V13.3…</div></main>
</div>
<script>
const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';
const cls=s=>s==='PAPER_ACTIVE'?'good':s==='FAIL_CLOSED'?'bad':s==='MARKET_CLOSED'?'warn':'info';
const empty=t=>`<div class="empty">${E(t)}</div>`;
function card(label,value,note='',kind=''){return `<div class="card"><div class="label">${E(label)}</div><div class="value ${kind}">${E(value)}</div><div class="note">${E(note)}</div></div>`}
function candidateCard(c,type){
  const p=c||{}, e=p.eligibility||{};
  return `<article class="candidate"><h3><span class="ticker">${E(p.ticker)}</span> — ${E(p.companyNameAr||p.companyNameEn||'')}</h3>
  <div class="tags"><span class="tag">${E(type)}</span><span class="tag">${E(e.statusLabelAr||e.status||'')}</span><span class="tag">السيولة: ${E(p.liquiditySource||'المصدر')}</span></div>
  <div class="numbers">
    <div class="num">السعر<strong>${N(p.price,3)}</strong></div><div class="num">الدخول<strong>${N(p.entryLow,3)}–${N(p.entryHigh,3)}</strong></div><div class="num">وقف الخسارة<strong>${N(p.stopLoss,3)}</strong></div>
    <div class="num">الهدف 1<strong>${N(p.target1,3)}</strong></div><div class="num">R/R<strong>${N(p.riskReward,2)}</strong></div><div class="num">الجودة<strong>${N(p.dataQuality,0)}%</strong></div>
  </div></article>`;
}
function tableRows(items,fn){return items.length?items.map(fn).join(''):`<tr><td colspan="8">لا توجد بيانات</td></tr>`}
function render(d){
  const s=d.status||{}, c=d.counts||{}, m=d.market||{}, metrics=d.paper?.metrics||{};
  const decision=d.today?.decisionCandidates||[], paper=d.today?.paperCandidates||[], watch=d.today?.watchOnly||[], reviews=d.reviewQueue?.items||[];
  document.getElementById('app').innerHTML=`
  <section class="section status"><div class="${cls(s.code)}">${E(s.labelAr||s.code)}</div><small>${E(s.reasonAr||'')}</small></section>
  <section class="section"><div class="cards">
    ${card('جلسة السوق',m.latestAvailableSession||'—',`المتوقعة ${m.expectedLatestSession||'—'}`,'info')}
    ${card('مؤهل تاريخيًا للقرار',N(c.decisionEligibleHistory,0),'بعد V13.1','good')}
    ${card('مرشحو قرار اليوم',N(c.decisionCandidates,0),'تنفيذ حقيقي مغلق',c.decisionCandidates?'good':'warn')}
    ${card('مرشحو التداول الورقي',N(c.paperCandidates,0),'يبدأ القياس من جلسة لاحقة',c.paperCandidates?'info':'warn')}
    ${card('الصفقات المغلقة',N(c.closedTrades,0),`مفتوحة ${N(c.openTrades,0)} — معلقة ${N(c.pendingTrades,0)}`)}
    ${card('قائمة المراجعة',N(c.reviewQueue,0),'حالات تحتاج تحقق أو استكمال','warn')}
  </div></section>
  <section class="section">
    <div class="tabs">
      <button class="tab active" data-pane="overview">لوحة اليوم</button><button class="tab" data-pane="paper">التداول الورقي</button><button class="tab" data-pane="watch">المراقبة والرفض</button><button class="tab" data-pane="review">المراجعة</button><button class="tab" data-pane="health">صحة التشغيل</button><button class="tab" data-pane="results">النتائج</button>
    </div>
    <div id="overview" class="pane active"><h2>مرشحو اليوم</h2><div class="grid">${decision.length?decision.map(x=>candidateCard(x,'قرار ورقي')).join(''):empty('لا توجد مرشحات قرار اجتازت كل البوابات في هذه الجلسة.')}</div></div>
    <div id="paper" class="pane"><h2>مرشحو التداول الورقي</h2><div class="grid">${paper.length?paper.map(x=>candidateCard(x,'تداول ورقي')).join(''):empty('لا توجد مرشحات تداول ورقي الآن.')}</div></div>
    <div id="watch" class="pane"><h2>المراقبة وأسباب الرفض</h2>
      <table><thead><tr><th>السهم</th><th>السعر</th><th>الحالة</th><th>أسباب عدم القبول</th></tr></thead><tbody>${tableRows(watch,x=>`<tr><td>${E(x.ticker)}</td><td>${N(x.price,3)}</td><td>${E(x.eligibility?.statusLabelAr||x.eligibility?.status||'')}</td><td>${E((x.failedReasons||[]).join(' | '))}</td></tr>`)}</tbody></table>
      <h3>الأسباب الأكثر تكرارًا</h3><table><thead><tr><th>السبب</th><th>العدد</th></tr></thead><tbody>${tableRows(d.today?.rejectionSummary||[],x=>`<tr><td>${E(x.reason)}</td><td>${N(x.count,0)}</td></tr>`)}</tbody></table>
    </div>
    <div id="review" class="pane"><h2>قائمة المراجعة</h2><table><thead><tr><th>السهم</th><th>الحالة</th><th>الجلسات</th><th>آخر جلسة</th><th>الإجراء المطلوب</th></tr></thead><tbody>${tableRows(reviews,x=>`<tr><td>${E(x.ticker)}</td><td>${E(x.statusLabelAr||x.status)}</td><td>${N(x.sessions,0)}</td><td>${E(x.lastSession||'—')}</td><td>${E(x.requiredAction||'—')}</td></tr>`)}</tbody></table></div>
    <div id="health" class="pane"><h2>مراحل التشغيل</h2>${(d.pipeline?.stages||[]).map(x=>`<div class="stage"><div><span class="dot ${E(x.status)}"></span><strong>${E(x.labelAr)}</strong></div><div class="sub">${E(x.detail)}</div></div>`).join('')}
      <h2>ملفات صحة المصادر</h2><table><thead><tr><th>الملف</th><th>الحالة</th><th>الجلسة</th><th>العمر بالساعات</th></tr></thead><tbody>${tableRows(d.sourceHealth?.files||[],x=>`<tr><td>${E(x.path)}</td><td>${E(x.status)}</td><td>${E(x.session||'—')}</td><td>${N(x.ageHours,1)}</td></tr>`)}</tbody></table>
    </div>
    <div id="results" class="pane"><h2>نتائج التداول الورقي</h2><div class="cards">
      ${card('إجمالي الصفقات',N(metrics.totalTrades,0),'')}
      ${card('نسبة النجاح',`${N(metrics.winRatePct,2)}%`,'')}
      ${card('Profit Factor',N(metrics.profitFactor,2),'')}
      ${card('متوسط R',N(metrics.averageR,2),'')}
      ${card('أقصى تراجع',`${N(metrics.maxDrawdownPct,2)}%`,'')}
      ${card('أطول سلسلة خسائر',N(metrics.maxConsecutiveLosses,0),'')}
    </div><h2>بوابة النقل للتطبيق المستقر</h2>${(d.promotionGate?.checks||[]).map(x=>`<div class="stage"><div><span class="dot ${x.pass?'passed':'warning'}"></span><strong>${E(x.labelAr)}</strong></div><div class="sub">${N(x.value,2)} / ${N(x.target,2)}</div></div>`).join('')}<div class="footer">${E(d.promotionGate?.noteAr||'')}</div></div>
  </section>
  <footer class="section footer">آخر إنشاء: ${E(d.generatedAt)} • التشغيل المجدول: الأحد–الخميس • التنفيذ الحقيقي: مغلق<br>${(d.warnings||[]).map(E).join(' • ')}</footer>`;
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.pane).classList.add('active')});
}
async function loadData(){
  document.getElementById('app').innerHTML='<div class="section loading">جارٍ تحميل بيانات V13.3…</div>';
  try{const r=await fetch(`data/v13-3-daily-production.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);render(await r.json())}
  catch(e){document.getElementById('app').innerHTML=`<div class="section empty"><h2>لم تُبن بيانات V13.3 بعد</h2><p>${E(e.message)}</p><p>شغّل GitHub Action باسم: EGX Daily Production & Unified Decision Center — V13.3</p></div>`}
}
loadData();
</script>
</body>
</html>
