<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>EGX Pro V13.4 — Quant Research</title><style>
:root{color-scheme:dark;--bg:#06121f;--p:#0b2035;--p2:#0e2943;--line:#285475;--t:#eef8ff;--m:#9fc4da;--g:#2ed88f;--b:#29b6f6;--y:#ffc857;--r:#ff667a}*{box-sizing:border-box}body{margin:0;background:#06121f;color:var(--t);font-family:Tahoma,Arial,sans-serif}.w{max-width:1450px;margin:auto;padding:16px}.hero,.sec{background:var(--p);border:1px solid var(--line);border-radius:15px;margin-bottom:12px}.hero{padding:16px;display:flex;justify-content:space-between;gap:12px;align-items:center}.hero h1{margin:0 0 6px}.sub{color:var(--m);font-size:12px;line-height:1.7}.btn{display:inline-block;color:var(--t);text-decoration:none;border:1px solid #3f789c;background:var(--p2);border-radius:9px;padding:8px 11px;margin:3px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;padding:12px}.card{background:var(--p2);border:1px solid var(--line);border-radius:11px;padding:12px}.lab{color:var(--m);font-size:11px}.val{font-size:23px;font-weight:bold;margin-top:8px}.g{color:var(--g)}.b{color:var(--b)}.y{color:var(--y)}.r{color:var(--r)}h2{font-size:18px;margin:0;padding:13px;border-bottom:1px solid var(--line)}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #183b55;text-align:right;font-size:12px}th{color:#c6eaf9;background:var(--p2)}.pad{padding:12px;overflow:auto}.pill{border:1px solid var(--line);border-radius:999px;padding:4px 7px;font-size:10px}.empty{text-align:center;color:var(--m);padding:35px}@media(max-width:850px){.cards{grid-template-columns:repeat(2,1fr)}.hero{flex-direction:column;align-items:flex-start}}
</style></head><body><div class="w"><header class="hero"><div><h1>V13.4 Quant Research & Walk-Forward</h1><div class="sub">نتائج الاستراتيجيات على بيانات لم تُستخدم في اختيار إعداداتها • تكاليف وانزلاق • منع التسريب المستقبلي</div></div><div><a class="btn" href="recommendations.html">توصيات اليوم</a><a class="btn" href="index.html">V13.3</a></div></header><main id="app"><div class="sec empty">جارٍ تحميل نتائج البحث…</div></main></div><script>
const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';const C=(l,v,n='',c='')=>`<div class="card"><div class="lab">${E(l)}</div><div class="val ${c}">${E(v)}</div><div class="lab">${E(n)}</div></div>`;
async function load(){try{const [wr,mr,bt]=await Promise.all(['walk-forward-results.json','market-regime.json','strategy-backtests.json'].map(f=>fetch(`../data/quant/${f}?v=${Date.now()}`,{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`${f}: HTTP ${r.status}`);return r.json()})));const rows=wr.strategyValidation||[];document.getElementById('app').innerHTML=`<section class="sec"><div class="cards">${C('جلسة السوق',wr.folds?.at(-1)?.testEnd||mr.latestMarketSession||'—','آخر اختبار','b')}${C('نظام السوق',mr.labelAr||mr.code,`${N(mr.aboveSma50Pct,1)}% أعلى SMA50`,'b')}${C('طيات Walk-Forward',N(wr.folds?.length,0),'زمنية متتابعة')}${C('استراتيجيات بحثية',N(rows.filter(x=>x.researchValidated).length,0),'اجتازت الحد البحثي','g')}${C('جاهزة ورقيًا بقوة',N(rows.filter(x=>x.productionEligible).length,0),'حدود أكثر صرامة','y')}</div></section><section class="sec"><h2>صلاحية الاستراتيجيات خارج فترة التدريب</h2><div class="pad"><table><thead><tr><th>الاستراتيجية</th><th>الإعداد المختار</th><th>الحالة</th><th>الصفقات</th><th>Win Rate</th><th>Profit Factor</th><th>Average R</th><th>Max DD</th></tr></thead><tbody>${rows.map(x=>{const m=x.validationMetrics||{};return `<tr><td>${E(x.strategyLabelAr)}</td><td>${E(x.selectedVariantId)}</td><td><span class="pill">${E(x.status)}</span></td><td>${N(m.closedTrades,0)}</td><td>${N(m.winRatePct,2)}%</td><td>${N(m.profitFactor,2)}</td><td>${N(m.averageR,3)}</td><td>${N(m.maxDrawdownPct,2)}%</td></tr>`}).join('')}</tbody></table></div></section><section class="sec"><h2>طيات الاختبار الزمني</h2><div class="pad"><table><thead><tr><th>الطية</th><th>التدريب حتى</th><th>الاختبار من</th><th>الاختبار حتى</th><th>اختيارات النماذج</th></tr></thead><tbody>${(wr.folds||[]).map(f=>`<tr><td>${f.fold}</td><td>${E(f.trainEnd)}</td><td>${E(f.testStart)}</td><td>${E(f.testEnd)}</td><td>${E((f.selections||[]).map(s=>`${s.strategyId}:${s.selectedVariantId}`).join(' | '))}</td></tr>`).join('')}</tbody></table></div></section><section class="sec"><h2>افتراضات الاختبار</h2><div class="pad sub">الدخول: ${E(bt.assumptions?.entryTiming)} • الانزلاق: ${N(bt.assumptions?.entrySlippagePct,2)}% • التكلفة الدائرية: ${N(bt.assumptions?.roundTripCostPct,2)}% • مدة قصوى: ${N(bt.assumptions?.maximumHoldingSessions,0)} جلسات • تعارض الهدف والوقف: ${E(bt.assumptions?.sameBarConflictRule)} • لا يوجد استخدام لبيانات مستقبلية.</div></section>`}catch(e){document.getElementById('app').innerHTML=`<div class="sec empty"><h2>تعذر تحميل V13.4</h2><p>${E(e.message)}</p></div>`}}load();
</script></body></html>
