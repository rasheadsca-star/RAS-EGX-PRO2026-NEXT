<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>EGX Pro V13.5 — سجل التداول الورقي</title><style>
:root{color-scheme:dark;--bg:#061421;--panel:#0c263d;--panel2:#081d30;--line:#2a5877;--text:#eef9ff;--muted:#a4c8db;--green:#2bdb91;--blue:#31b9ff;--amber:#ffca5c;--red:#ff6b80}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#04101b,#081b2c);font-family:Tahoma,Arial,sans-serif;color:var(--text)}.wrap{max-width:1450px;margin:auto;padding:16px}.hero,.section{background:var(--panel);border:1px solid var(--line);border-radius:16px;margin-bottom:13px}.hero{padding:17px;display:flex;justify-content:space-between;gap:15px;align-items:center}.hero h1{margin:0 0 7px;font-size:23px}.muted{color:var(--muted);font-size:12px;line-height:1.8}.actions{display:flex;gap:7px;flex-wrap:wrap}.btn{color:var(--text);text-decoration:none;background:#103653;border:1px solid #4b83a4;border-radius:9px;padding:9px 12px;font-weight:bold}.cards{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:9px;padding:13px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px}.card span{font-size:10px;color:var(--muted)}.card b{font-size:24px;display:block;margin-top:10px}.content{padding:13px}table{width:100%;border-collapse:collapse;background:var(--panel2)}th,td{padding:9px;border-bottom:1px solid #1d4059;text-align:right;font-size:11px}th{background:#10314b;color:#caedfb}.good{color:var(--green)}.bad{color:var(--red)}.warn{color:var(--amber)}.info{color:var(--blue)}.pill{border:1px solid var(--line);border-radius:999px;padding:4px 7px;font-size:9px}.empty{text-align:center;padding:35px;color:var(--muted)}@media(max-width:1000px){.cards{grid-template-columns:repeat(3,1fr)}table{display:block;overflow:auto}}@media(max-width:620px){.wrap{padding:7px}.hero{flex-direction:column;align-items:flex-start}.cards{grid-template-columns:repeat(2,1fr);padding:8px}}
</style></head><body><div class="wrap"><header class="hero"><div><h1>EGX Pro V13.5 — سجل التداول الورقي</h1><div class="muted">إشارات ثابتة غير قابلة للتعديل بأثر رجعي • دخول من الجلسة التالية • تكاليف وانزلاق • وقف أولًا عند تعارض الهدف والوقف</div></div><div class="actions"><button class="btn" onclick="loadAll()">تحديث</button><a class="btn" href="adaptive-recommendations.html">التوصيات المتكيفة</a><a class="btn" href="recommendations.html">V13.4</a></div></header><main id="app"><section class="section empty">جارٍ تحميل السجل…</section></main></div><script>
const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';const C=s=>s==='CLOSED'?'good':s==='OPEN'?'info':s==='PENDING_ENTRY'?'warn':['CANCELLED','EXPIRED'].includes(s)?'bad':'';const card=(l,v,n='')=>`<div class="card"><span>${E(l)}</span><b>${E(v)}</b><small class="muted">${E(n)}</small></div>`;
function render(l,m){const x=m.overall||{},signals=(l.signals||[]).slice().sort((a,b)=>String(b.signalDate).localeCompare(String(a.signalDate)));document.getElementById('app').innerHTML=`<section class="section"><div class="cards">${card('إجمالي الإشارات',N(x.totalSignals,0),'منذ التفعيل')}${card('معلقة للدخول',N(x.pendingEntries,0),'جلسة دخول واحدة')}${card('صفقات مفتوحة',N(x.openTrades,0),'ورقي فقط')}${card('صفقات مغلقة',N(x.closedTrades,0),'بعد التكاليف')}${card('نسبة النجاح',N(x.winRatePct,1)+'%','ليست وحدها معيارًا')}${card('Profit Factor',N(x.profitFactor,2),'الهدف لاحقًا ≥ 1.20')}${card('متوسط R',N(x.averageR,2),'بعد التكاليف')}${card('أقصى تراجع',N(x.maxDrawdownPct,2)+'%','تراكمي مبسط')}${card('سلسلة الخسائر',N(x.maxConsecutiveLosses,0),'قاطع الأمان')}${card('بعد جلسة',N(x.snapshots?.['1']?.averageReturnPct,2)+'%','متوسط القياس')}${card('بعد 5 جلسات',N(x.snapshots?.['5']?.averageReturnPct,2)+'%','متوسط القياس')}${card('بعد 10 جلسات',N(x.snapshots?.['10']?.averageReturnPct,2)+'%','متوسط القياس')}</div></section><section class="section content"><h2>الإشارات والصفقات</h2>${signals.length?`<table><thead><tr><th>السهم</th><th>الاستراتيجية</th><th>جلسة الإشارة</th><th>الحالة</th><th>الدخول</th><th>الخروج</th><th>النتيجة</th><th>العائد الصافي</th><th>R</th><th>مدة الاحتفاظ</th></tr></thead><tbody>${signals.map(s=>`<tr><td><b>${E(s.ticker)}</b></td><td>${E(s.strategyLabelAr)}</td><td>${E(s.signalDate)}</td><td><span class="pill ${C(s.status)}">${E(s.status)}</span></td><td>${E(s.entryDate||'—')}<br>${N(s.entryPrice,3)}</td><td>${E(s.exitDate||s.cancelDate||s.expiryDate||'—')}<br>${N(s.exitPrice,3)}</td><td>${E(s.outcome||'بانتظار النتيجة')}</td><td class="${Number(s.netReturnPct)>0?'good':Number.isFinite(Number(s.netReturnPct))?'bad':''}">${N(s.netReturnPct,2)}%</td><td>${N(s.rMultiple,2)}</td><td>${N(s.holdingSessions,0)}</td></tr>`).join('')}</tbody></table>`:`<div class="empty">تم إنشاء خط الأساس. سيبدأ تسجيل الإشارات من أول جلسة سوق جديدة بعد التفعيل.</div>`}</section><section class="section content"><h2>الأداء حسب الاستراتيجية</h2><table><thead><tr><th>الاستراتيجية</th><th>الإشارات</th><th>المغلقة</th><th>نسبة النجاح</th><th>Profit Factor</th><th>Average R</th><th>Drawdown</th><th>سلسلة خسائر</th></tr></thead><tbody>${Object.entries(m.byStrategy||{}).map(([id,v])=>`<tr><td>${E(id)}</td><td>${N(v.totalSignals,0)}</td><td>${N(v.closedTrades,0)}</td><td>${N(v.winRatePct,1)}%</td><td>${N(v.profitFactor,2)}</td><td>${N(v.averageR,2)}</td><td>${N(v.maxDrawdownPct,2)}%</td><td>${N(v.maxConsecutiveLosses,0)}</td></tr>`).join('')}</tbody></table></section><section class="section content muted">جلسة التفعيل: ${E(l.activationSession)} • آخر جلسة معالجة: ${E(l.lastProcessedSession)} • التنفيذ الحقيقي مغلق دائمًا.</section>`}
async function loadAll(){try{const [lr,mr]=await Promise.all([fetch(`../data/quant/paper-recommendation-ledger.json?v=${Date.now()}`,{cache:'no-store'}),fetch(`../data/quant/paper-recommendation-metrics.json?v=${Date.now()}`,{cache:'no-store'})]);if(!lr.ok||!mr.ok)throw new Error('ملفات المتابعة لم تُنشأ بعد');render(await lr.json(),await mr.json())}catch(e){document.getElementById('app').innerHTML=`<section class="section empty"><h2>لم يتم تشغيل V13.5 بعد</h2><p>${E(e.message)}</p></section>`}}loadAll();
</script></body></html>
