<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>EGX Pro V13.4 — توصيات البحث والتداول الورقي</title>
<style>
:root{color-scheme:dark;--bg:#06121f;--p:#0b2035;--p2:#0e2943;--line:#285475;--t:#eef8ff;--m:#9fc4da;--g:#2ed88f;--b:#29b6f6;--y:#ffc857;--r:#ff667a}*{box-sizing:border-box}body{margin:0;background:linear-gradient(#04101b,#071b2d);color:var(--t);font-family:Tahoma,Arial,sans-serif}.w{max-width:1450px;margin:auto;padding:16px}.hero,.section{background:var(--p);border:1px solid var(--line);border-radius:16px;margin-bottom:13px}.hero{padding:17px;display:flex;justify-content:space-between;gap:15px;align-items:center}.hero h1{margin:0 0 7px;font-size:23px}.sub{color:var(--m);font-size:12px;line-height:1.8}.btn{display:inline-block;border:1px solid #3f789c;background:var(--p2);border-radius:9px;padding:8px 11px;color:var(--t);text-decoration:none;margin:3px;cursor:pointer}.status{padding:15px 17px;font-size:18px;font-weight:bold}.cards{display:grid;grid-template-columns:repeat(6,minmax(140px,1fr));gap:9px;padding:12px}.card,.stock{background:var(--p2);border:1px solid var(--line);border-radius:12px;padding:12px}.lab{color:var(--m);font-size:11px}.val{font-size:24px;font-weight:bold;margin-top:9px}.g{color:var(--g)}.b{color:var(--b)}.y{color:var(--y)}.r{color:var(--r)}.section h2{font-size:18px;margin:0;padding:14px;border-bottom:1px solid var(--line)}.grid{display:grid;grid-template-columns:repeat(2,minmax(300px,1fr));gap:10px;padding:12px}.stock h3{margin:0 0 7px}.ticker{color:var(--b);font-size:21px}.tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}.tag{font-size:11px;border:1px solid var(--line);border-radius:999px;padding:4px 7px}.nums{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.num{background:#081b2d;border-radius:8px;padding:7px;font-size:11px}.num strong{display:block;font-size:15px;margin-top:4px}.reason{color:var(--m);font-size:12px;line-height:1.7;margin-top:9px}.fail{color:#ffd39a;font-size:11px;line-height:1.6;margin-top:7px}.empty{text-align:center;color:var(--m);padding:35px}.foot{padding:13px;color:var(--m);font-size:11px;line-height:1.8}@media(max-width:1000px){.cards{grid-template-columns:repeat(3,1fr)}}@media(max-width:680px){.w{padding:7px}.hero{flex-direction:column;align-items:flex-start}.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}.nums{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div class="w">
<header class="hero"><div><h1>EGX Pro V13.4 — توصيات البحث والتداول الورقي</h1><div class="sub">تحليل قاعدة البيانات التاريخية • دخول في الجلسة التالية • احتفاظ من 3 إلى 10 جلسات • لا يوجد تنفيذ حقيقي</div></div><div><button class="btn" onclick="load()">تحديث</button><a class="btn" href="quant-research.html">نتائج البحث</a><a class="btn" href="index.html">V13.3</a><a class="btn" href="../">V11 المستقر</a></div></header>
<main id="app"><div class="section empty">جارٍ تحميل توصيات V13.4…</div></main>
</div>
<script>
const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';
const card=(l,v,n='',c='')=>`<div class="card"><div class="lab">${E(l)}</div><div class="val ${c}">${E(v)}</div><div class="lab">${E(n)}</div></div>`;
function stock(x){const p=x.plan||{},i=x.indicators||{};return `<article class="stock"><h3><span class="ticker">${E(x.ticker)}</span> — ${E(x.companyNameAr||x.companyNameEn||'')}</h3><div class="tags"><span class="tag">${E(x.statusLabelAr)}</span><span class="tag">${E(x.strategyLabelAr)}</span><span class="tag">درجة ${N(x.recommendationScore,1)}</span><span class="tag">${E(x.strategyValidationStatus)}</span></div><div class="nums"><div class="num">السعر<strong>${N(x.price,3)}</strong></div><div class="num">الدخول<strong>${N(p.entryLow,3)}–${N(p.entryHigh,3)}</strong></div><div class="num">الوقف<strong>${N(p.stopLoss,3)}</strong></div><div class="num">الهدف 1<strong>${N(p.target1,3)}</strong></div><div class="num">الهدف 2<strong>${N(p.target2,3)}</strong></div><div class="num">R/R<strong>${N(p.riskReward1,2)}</strong></div><div class="num">RSI<strong>${N(i.rsi14,1)}</strong></div><div class="num">الحجم/المتوسط<strong>${N(i.volumeRatio20,2)}</strong></div><div class="num">القوة النسبية<strong>${N(i.relativeStrength20Pct,2)}%</strong></div></div><div class="reason">${E(x.reasonAr)}</div>${(x.failedConditions||[]).length?`<div class="fail">غير المكتمل: ${E(x.failedConditions.slice(0,4).join(' | '))}</div>`:''}</article>`}
async function load(){document.getElementById('app').innerHTML='<div class="section empty">جارٍ التحميل…</div>';try{const r=await fetch(`../data/quant/daily-recommendations.json?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json(),c=d.counts||{},reg=d.marketRegime||{};document.getElementById('app').innerHTML=`<section class="section status ${d.paperCandidates?.length?'g':'y'}">${E(d.statusLabelAr)} — جلسة ${E(d.sessionId||'—')}</section><section class="section"><div class="cards">${card('نظام السوق',reg.labelAr||reg.code,'مبني على اتساع السوق','b')}${card('أسهم محللة',N(c.symbolsAnalyzed,0),'قاعدة التاريخ')}${card('مرشحو ورقي',N(c.paperCandidates,0),'ليس شراء فعلي',c.paperCandidates?'g':'y')}${card('مراقبة مشروطة',N(c.watchCandidates,0),'شروط لم تكتمل','y')}${card('مدة الصفقة','3–10','جلسات')}${card('صلاحية الدخول','1','الجلسة التالية')}</div></section><section class="section"><h2>مرشحو التداول الورقي</h2><div class="grid">${d.paperCandidates?.length?d.paperCandidates.map(stock).join(''):'<div class="empty">لا توجد إشارات اجتازت كل بوابات البحث والأهلية والسوق في هذه الجلسة.</div>'}</div></section><section class="section"><h2>مراقبة مشروطة</h2><div class="grid">${d.watchCandidates?.length?d.watchCandidates.map(stock).join(''):'<div class="empty">لا توجد عناصر مراقبة.</div>'}</div></section><footer class="section foot">${E(d.warningAr)}<br>قاعدة الاختبار: إشارة بعد الإغلاق، دخول افتراضي في افتتاح الجلسة التالية مع انزلاق، تكاليف افتراضية، وإذا لمس الوقف والهدف في الجلسة نفسها يُحتسب الوقف أولًا.</footer>`}catch(e){document.getElementById('app').innerHTML=`<div class="section empty"><h2>بيانات V13.4 غير موجودة بعد</h2><p>${E(e.message)}</p><p>شغّل Workflow: EGX Quant Research & Daily Recommendations — V13.4</p></div>`}}
load();
</script></body></html>
