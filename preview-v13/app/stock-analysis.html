<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V13.7 تحليل سهم</title>
<style>
:root{color-scheme:dark;--bg:#06111d;--p:#0b1f33;--p2:#102b45;--line:#2b5674;--t:#ecf8ff;--m:#9ebdd0;--b:#38bdf8;--g:#36d995;--a:#ffc857;--r:#ff6d7d}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#04101b,#071a2b);color:var(--t);font-family:Tahoma,Arial,sans-serif}button,input,select{font:inherit}.wrap{max-width:1500px;margin:auto;padding:14px}.hero,.panel{background:rgba(11,31,51,.97);border:1px solid var(--line);border-radius:15px;margin-bottom:12px}.hero{padding:15px;display:flex;gap:12px;align-items:center;justify-content:space-between}.hero h1{margin:0 0 6px;font-size:21px}.muted{color:var(--m);font-size:11px;line-height:1.7}.search{display:flex;gap:7px;min-width:min(520px,100%)}input,select{background:#091c2e;border:1px solid #376682;color:var(--t);padding:10px;border-radius:9px;outline:none}input{flex:1}.btn{background:#123c59;border:1px solid #3b769a;color:var(--t);padding:9px 12px;border-radius:9px;cursor:pointer}.layout{display:grid;grid-template-columns:310px minmax(0,1fr);gap:12px}.list{height:calc(100vh - 135px);min-height:650px;overflow:auto}.filters{padding:10px;display:grid;gap:7px;border-bottom:1px solid var(--line)}.row{padding:10px;border-bottom:1px solid #193d55;cursor:pointer}.row:hover,.row.active{background:#123550}.row b{color:var(--b)}.row small{display:block;color:var(--m);margin-top:5px}.detail{min-width:0}.head{padding:15px;display:flex;justify-content:space-between;gap:10px;align-items:flex-start}.ticker{color:var(--b)}.tags{display:flex;gap:6px;flex-wrap:wrap}.tag{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:5px 8px}.cards{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;padding:11px}.card{background:var(--p2);border:1px solid #2a536e;border-radius:10px;padding:11px}.card small{color:var(--m)}.card b{display:block;font-size:20px;margin-top:8px}.tabs{display:flex;gap:6px;padding:10px;border-bottom:1px solid var(--line);flex-wrap:wrap}.tab{background:#091c2e;border:1px solid var(--line);color:var(--t);padding:8px 11px;border-radius:8px;cursor:pointer}.tab.active{background:#155378}.pane{display:none;padding:12px}.pane.active{display:block}canvas{width:100%;height:390px;background:#06121e;border-radius:10px;border:1px solid #20465f}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.metric{background:#0a2034;border:1px solid #244b66;border-radius:9px;padding:10px}.metric span{color:var(--m);font-size:10px}.metric b{display:block;margin-top:6px}.signal{border:1px solid #6e5a2e;background:#2e2616;padding:12px;border-radius:10px;line-height:1.8}.good{color:var(--g)}.warn{color:var(--a)}.bad{color:var(--r)}table{width:100%;border-collapse:collapse}th,td{padding:8px;border-bottom:1px solid #193d55;font-size:11px;text-align:right}.empty{padding:45px;text-align:center;color:var(--m)}@media(max-width:950px){.layout{grid-template-columns:1fr}.list{height:320px;min-height:0}.cards{grid-template-columns:repeat(3,1fr)}}@media(max-width:600px){.wrap{padding:6px}.hero{flex-direction:column;align-items:stretch}.search{min-width:0}.cards{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:repeat(2,1fr)}canvas{height:290px}}
</style></head><body><div class="wrap">
<div class="hero"><div><h1>V13.7 — التحليل الأصلي لكل الأسهم</h1><div class="muted">بيانات 20–100 جلسة، مؤشرات فنية، دعم ومقاومة، سيولة، وإشارة V13 الحالية إن وجدت.</div></div><div class="search"><input id="q" placeholder="ابحث بالرمز أو اسم الشركة"><button class="btn" id="refresh">تحديث</button></div></div>
<div class="layout"><aside class="panel list"><div class="filters"><select id="sector"><option value="all">كل القطاعات</option></select><select id="trend"><option value="all">كل الاتجاهات</option><option value="BULLISH">صاعد</option><option value="NEUTRAL">محايد</option><option value="BEARISH">هابط</option></select><select id="sort"><option value="signal">التوصية ثم الدرجة</option><option value="technical">الدرجة الفنية</option><option value="liquidity">السيولة</option><option value="ticker">الرمز</option></select></div><div id="stockList"></div></aside>
<main class="detail" id="detail"><div class="panel empty">جارٍ تحميل قاعدة الأسهم…</div></main></div></div>
<script>
'use strict';const INDEX='../../data/quant/stock-intelligence-index.json';const DETAIL=t=>`../../data/quant/stocks/${encodeURIComponent(t)}.json`;const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';let index=null,current=null;
async function getJson(url){const r=await fetch(`${url}?v=${Date.now()}`,{cache:'no-store'});if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}
function filtered(){const q=document.getElementById('q').value.trim().toLowerCase(),sec=document.getElementById('sector').value,tr=document.getElementById('trend').value,sort=document.getElementById('sort').value;let a=(index?.stocks||[]).filter(s=>(!q||s.ticker.toLowerCase().includes(q)||(s.companyNameAr||'').toLowerCase().includes(q)||(s.companyNameEn||'').toLowerCase().includes(q))&&(sec==='all'||s.sector===sec)&&(tr==='all'||s.trendCode===tr));a.sort((x,y)=>sort==='technical'?y.technicalScore-x.technicalScore:sort==='liquidity'?(y.averageTurnover20Egp||0)-(x.averageTurnover20Egp||0):sort==='ticker'?x.ticker.localeCompare(y.ticker):((y.recommendationScore??-1)-(x.recommendationScore??-1)||y.technicalScore-x.technicalScore));return a}
function renderList(){const a=filtered();document.getElementById('stockList').innerHTML=a.map(s=>`<div class="row ${current===s.ticker?'active':''}" data-t="${E(s.ticker)}"><b>${E(s.ticker)}</b> — ${E(s.companyNameAr||s.companyNameEn||'')}<small>${E(s.sector)} • ${E(s.trendLabelAr)} • فني ${N(s.technicalScore,0)} • ${E(s.recommendationLabelAr||'لا توجد إشارة')}</small></div>`).join('')||'<div class="empty">لا توجد نتائج.</div>';document.querySelectorAll('[data-t]').forEach(el=>el.onclick=()=>loadStock(el.dataset.t))}
function card(l,v,n=''){return `<div class="card"><small>${E(l)}</small><b>${E(v)}</b><small>${E(n)}</small></div>`}
function metric(l,v){return `<div class="metric"><span>${E(l)}</span><b>${E(v)}</b></div>`}
function drawChart(d,range=100){const c=document.getElementById('chart'),ctx=c.getContext('2d'),r=window.devicePixelRatio||1,w=c.clientWidth,h=c.clientHeight;c.width=w*r;c.height=h*r;ctx.scale(r,r);ctx.clearRect(0,0,w,h);const all=d.chart.close, n=Math.min(range,all.length), close=all.slice(-n),s20=d.chart.sma20.slice(-n),s50=d.chart.sma50.slice(-n),vol=d.chart.volume.slice(-n);const vals=[...close,...s20.filter(Number.isFinite),...s50.filter(Number.isFinite)],lo=Math.min(...vals),hi=Math.max(...vals),pad=35,x=i=>pad+i*(w-pad*2)/Math.max(1,n-1),y=v=>h-pad-(v-lo)*(h-pad*2)/(hi-lo||1);ctx.strokeStyle='#234b67';ctx.lineWidth=1;for(let i=0;i<5;i++){const yy=pad+i*(h-pad*2)/4;ctx.beginPath();ctx.moveTo(pad,yy);ctx.lineTo(w-pad,yy);ctx.stroke()}function line(arr,color,width){ctx.strokeStyle=color;ctx.lineWidth=width;ctx.beginPath();let started=false;arr.forEach((v,i)=>{if(!Number.isFinite(v))return;if(!started){ctx.moveTo(x(i),y(v));started=true}else ctx.lineTo(x(i),y(v))});ctx.stroke()}line(close,'#38bdf8',2);line(s20,'#37d996',1.3);line(s50,'#ffc857',1.3);ctx.fillStyle='#9ebdd0';ctx.font='11px Tahoma';ctx.fillText(N(hi,2),4,pad+4);ctx.fillText(N(lo,2),4,h-pad);ctx.fillStyle='#38bdf8';ctx.fillText('السعر',pad,16);ctx.fillStyle='#37d996';ctx.fillText('SMA20',pad+55,16);ctx.fillStyle='#ffc857';ctx.fillText('SMA50',pad+115,16)}
function renderDetail(d){const i=d.indicators||{},rec=d.recommendation||{},p=rec.plan||{};document.getElementById('detail').innerHTML=`<section class="panel"><div class="head"><div><h2><span class="ticker">${E(d.ticker)}</span> — ${E(d.companyNameAr||d.companyNameEn||'')}</h2><div class="muted">${E(d.sector)} • آخر جلسة ${E(d.sessionId)} • ${N(d.dataQuality.historySessions,0)} جلسة</div></div><div class="tags"><span class="tag">${E(d.technical.trendLabelAr)}</span><span class="tag">درجة ${N(d.technical.score,0)}</span><span class="tag">${E(rec.statusLabelAr)}</span></div></div><div class="cards">${card('السعر',N(d.latest.close,3),`${N(i.change1Pct,2)}%`)}${card('RSI 14',N(i.rsi14,1))}${card('SMA 20',N(i.sma20,3))}${card('SMA 50',N(i.sma50,3))}${card('الدعم 20',N(i.support20,3))}${card('المقاومة 20',N(i.resistance20,3))}${card('الحجم النسبي',N(i.volumeRatio20,2))}${card('متوسط السيولة',N(i.averageTurnover20Egp,0),'جنيه')}${card('ATR %',`${N(i.atrPct,2)}%`)}${card('عائد 20 جلسة',`${N(i.return20Pct,2)}%`)}${card('التذبذب 20',`${N(i.volatility20Pct,2)}%`)}${card('جودة التاريخ',E(d.dataQuality.eligibilityLabelAr||d.dataQuality.eligibilityStatus||'غير مصنف'))}</div></section><section class="panel"><div class="tabs"><button class="tab active" data-pane="chartPane">الرسم</button><button class="tab" data-pane="indPane">المؤشرات</button><button class="tab" data-pane="recPane">قرار V13</button><button class="tab" data-pane="histPane">آخر الجلسات</button><select id="range"><option value="20">20 جلسة</option><option value="50">50 جلسة</option><option value="100" selected>100 جلسة</option></select></div><div id="chartPane" class="pane active"><canvas id="chart"></canvas></div><div id="indPane" class="pane"><div class="grid">${metric('EMA 9',N(i.ema9,3))}${metric('EMA 21',N(i.ema21,3))}${metric('MACD',N(i.macd,3))}${metric('MACD Signal',N(i.macdSignal,3))}${metric('عائد 5 جلسات',`${N(i.return5Pct,2)}%`)}${metric('عائد 50 جلسة',`${N(i.return50Pct,2)}%`)}${metric('المسافة من الدعم',`${N(i.distanceFromSupport20Pct,2)}%`)}${metric('مقارنة بالمقاومة',`${N(i.relativeToResistance20Pct,2)}%`)}${metric('المسافة من قمة 50',`${N(i.distanceFromHigh50Pct,2)}%`)}</div></div><div id="recPane" class="pane"><div class="signal"><b>${E(rec.statusLabelAr)}</b><br>${E(rec.strategyLabelAr||'لا توجد استراتيجية حالية')}<br>${E(rec.reasonAr||'')}<hr>الدخول: ${N(p.entryLow,3)}–${N(p.entryHigh,3)} • الوقف: ${N(p.stopLoss,3)} • الهدف 1: ${N(p.target1,3)} • الهدف 2: ${N(p.target2,3)} • R/R: ${N(p.riskReward1,2)}${(rec.failedConditions||[]).length?`<hr><span class="warn">الشروط غير المكتملة: ${E(rec.failedConditions.join(' | '))}</span>`:''}<hr><span class="bad">بحث وتداول ورقي فقط؛ ليس أمر شراء فعليًا.</span></div></div><div id="histPane" class="pane"><div style="overflow:auto;max-height:480px"><table><thead><tr><th>التاريخ</th><th>فتح</th><th>أعلى</th><th>أدنى</th><th>إغلاق</th><th>حجم</th></tr></thead><tbody>${d.chart.dates.slice().reverse().map((date,j)=>{const k=d.chart.dates.length-1-j;return `<tr><td>${E(date)}</td><td>${N(d.chart.open[k],3)}</td><td>${N(d.chart.high[k],3)}</td><td>${N(d.chart.low[k],3)}</td><td>${N(d.chart.close[k],3)}</td><td>${N(d.chart.volume[k],0)}</td></tr>`}).join('')}</tbody></table></div></div></section>`;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.pane').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.pane).classList.add('active');if(b.dataset.pane==='chartPane')setTimeout(()=>drawChart(d,Number(document.getElementById('range').value)),20)});document.getElementById('range').onchange=e=>drawChart(d,Number(e.target.value));setTimeout(()=>drawChart(d,100),30)}
async function loadStock(t){current=t;renderList();document.getElementById('detail').innerHTML='<div class="panel empty">جارٍ تحميل السهم…</div>';try{const d=await getJson(DETAIL(t));renderDetail(d)}catch(e){document.getElementById('detail').innerHTML=`<div class="panel empty">تعذر تحميل ${E(t)}: ${E(e.message)}</div>`}}
async function load(){document.getElementById('detail').innerHTML='<div class="panel empty">جارٍ تحميل قاعدة الأسهم…</div>';try{index=await getJson(INDEX);const secs=[...new Set(index.stocks.map(s=>s.sector).filter(Boolean))].sort();document.getElementById('sector').innerHTML='<option value="all">كل القطاعات</option>'+secs.map(s=>`<option>${E(s)}</option>`).join('');renderList();if(index.stocks.length)loadStock(index.stocks[0].ticker)}catch(e){document.getElementById('detail').innerHTML=`<div class="panel empty">لم يتم بناء V13.7 بعد: ${E(e.message)}</div>`}}
['q','sector','trend','sort'].forEach(id=>document.getElementById(id).addEventListener(id==='q'?'input':'change',renderList));document.getElementById('refresh').onclick=load;window.addEventListener('resize',()=>{if(current)loadStock(current)});load();
</script></body></html>
