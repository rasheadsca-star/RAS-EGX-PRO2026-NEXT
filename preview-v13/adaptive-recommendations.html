<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>EGX Pro V13.5 — التوصيات المتكيفة</title>
<style>
:root{color-scheme:dark;--bg:#061421;--panel:#0c263d;--panel2:#0a1e31;--line:#2c5a78;--text:#eef9ff;--muted:#a3c6da;--green:#28db91;--blue:#31b8ff;--amber:#ffc85c;--red:#ff6b7f}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#04101b,#081b2d);color:var(--text);font-family:Tahoma,Arial,sans-serif}.wrap{max-width:1450px;margin:auto;padding:16px}a{color:inherit;text-decoration:none}
.hero,.section{background:rgba(12,38,61,.97);border:1px solid var(--line);border-radius:17px;margin-bottom:13px}.hero{padding:17px;display:flex;justify-content:space-between;gap:15px;align-items:center}.hero h1{margin:0 0 7px;font-size:23px}.muted{color:var(--muted);font-size:12px;line-height:1.8}.actions{display:flex;gap:7px;flex-wrap:wrap}.btn{background:#103653;border:1px solid #4c83a5;border-radius:9px;padding:9px 12px;font-weight:bold;cursor:pointer}
.status{padding:15px 18px;display:flex;justify-content:space-between;gap:10px;align-items:center}.status strong{font-size:20px}.good{color:var(--green)}.warn{color:var(--amber)}.bad{color:var(--red)}.info{color:var(--blue)}
.cards{display:grid;grid-template-columns:repeat(6,minmax(145px,1fr));gap:9px;padding:13px}.card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:12px;min-height:94px}.card span{display:block;color:var(--muted);font-size:11px}.card b{display:block;font-size:25px;margin-top:12px}.card small{color:var(--muted);font-size:10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;padding:11px;border-bottom:1px solid var(--line)}.tab{background:#071a2b;border:1px solid var(--line);color:var(--text);border-radius:9px;padding:8px 11px;cursor:pointer}.tab.active{background:#155074}.pane{display:none;padding:13px}.pane.active{display:block}.grid{display:grid;grid-template-columns:repeat(2,minmax(320px,1fr));gap:10px}
.item{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:14px}.item h3{margin:0 0 8px;font-size:18px}.ticker{color:var(--blue)}.tags{display:flex;gap:5px;flex-wrap:wrap;margin:8px 0}.tag{font-size:10px;border:1px solid var(--line);border-radius:999px;padding:5px 8px;background:#0e2b45}.numbers{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.num{background:#071a2b;border-radius:8px;padding:8px;font-size:10px}.num b{font-size:14px;display:block;margin-top:4px}.progress{height:9px;background:#06111d;border-radius:20px;overflow:hidden;margin:9px 0}.progress i{display:block;height:100%;background:linear-gradient(90deg,#2dd692,#33aee9)}
.missing{margin:8px 0 0;padding:9px;background:#281e16;border:1px solid #72502f;border-radius:9px;color:#ffd795;font-size:11px;line-height:1.8}table{width:100%;border-collapse:collapse;background:var(--panel2)}th,td{padding:9px;border-bottom:1px solid #1c4059;text-align:right;font-size:11px}th{background:#10314b;color:#c7ebfb}.empty{text-align:center;padding:35px;color:var(--muted)}
@media(max-width:980px){.cards{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:1fr}}@media(max-width:620px){.wrap{padding:7px}.hero{flex-direction:column;align-items:flex-start}.cards{grid-template-columns:repeat(2,1fr);padding:8px}.numbers{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body><div class="wrap">
<header class="hero"><div><h1>EGX Pro V13.5 — التوصيات المتكيفة</h1><div class="muted">معايرة Walk-Forward + مراقبة قرب اكتمال الإشارة + تحويل تلقائي للتداول الورقي عند اجتياز جميع الشروط</div></div><div class="actions"><button class="btn" onclick="loadAll()">تحديث</button><a class="btn" href="recommendations.html">V13.4</a><a class="btn" href="paper-tracker.html">متابعة التداول الورقي</a><a class="btn" href="./">V13.3</a></div></header>
<main id="app"><section class="section empty">جارٍ تحميل نتائج V13.5…</section></main>
</div>
<script>
const E=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
const N=(v,d=2)=>Number.isFinite(Number(v))?Number(v).toLocaleString('ar-EG',{maximumFractionDigits:d}):'—';
const card=(l,v,n='')=>`<div class="card"><span>${E(l)}</span><b>${E(v)}</b><small>${E(n)}</small></div>`;
const empty=t=>`<div class="empty">${E(t)}</div>`;
function candidate(x,paper){const a=x.adaptive||{},pl=x.plan||{},miss=a.missingRequirementsAr||[];return `<article class="item"><h3><span class="ticker">${E(x.ticker)}</span> — ${E(x.companyNameAr||x.companyNameEn||'')}</h3><div class="tags"><span class="tag">${E(x.statusLabelAr)}</span><span class="tag">${E(x.strategyLabelAr)}</span><span class="tag">درجة ${N(x.recommendationScore,1)}</span><span class="tag">${E(a.strategyHealthStatus)}</span></div><div class="muted">قرب اكتمال الإشارة: <b>${N(a.proximityPct,1)}%</b></div><div class="progress"><i style="width:${Math.max(0,Math.min(100,Number(a.proximityPct)||0))}%"></i></div><div class="numbers"><div class="num">السعر<b>${N(x.price,3)}</b></div><div class="num">الدخول<b>${N(pl.entryLow,3)}–${N(pl.entryHigh,3)}</b></div><div class="num">الوقف<b>${N(pl.stopLoss,3)}</b></div><div class="num">الهدف 1<b>${N(pl.target1,3)}</b></div><div class="num">R/R<b>${N(pl.riskReward1,2)}</b></div><div class="num">RSI<b>${N(x.indicators?.rsi14,1)}</b></div><div class="num">الحجم النسبي<b>${N(x.indicators?.volumeRatio20,2)}</b></div><div class="num">حد القبول<b>${N(a.minimumRequiredScore,1)}</b></div></div>${miss.length?`<div class="missing"><b>ما الذي ينقص؟</b><br>${miss.map(E).join('<br>')}</div>`:`<div class="missing" style="background:#123426;border-color:#2c8058;color:#bff8d9">اجتاز جميع بوابات V13.5. التسجيل ورقي فقط ويبدأ من الجلسة التالية.</div>`}</article>`}
function render(r,h){const c=r.counts||{},reg=r.marketRegime||{};document.getElementById('app').innerHTML=`<section class="section status"><strong class="${r.status==='ADAPTIVE_PAPER_READY'?'good':'warn'}">${E(r.statusLabelAr)}</strong><span class="muted">جلسة ${E(r.sessionId)} — ${E(reg.labelAr||reg.code||'')}</span></section><section class="section"><div class="cards">${card('مرشحو التداول الورقي',N(c.adaptivePaperCandidates,0),'بعد المعايرة')}${card('المراقبة المشروطة',N(c.conditionalWatch,0),'مرتبة حسب القرب')}${card('الاستراتيجيات النشطة',N(c.activeStrategies,0),'من أصل 3')}${card('الاستراتيجيات الموقوفة',N(c.pausedStrategies,0),'قاطع أمان')}${card('إشارات جديدة',N(c.newSignalsRegistered,0),'هذه الجلسة')}${card('صفقات ورقية مغلقة',N(c.closedPaperSignals,0),'نتائج قابلة للقياس')}</div></section><section class="section"><div class="tabs"><button class="tab active" data-p="paper">الجاهزة ورقيًا</button><button class="tab" data-p="watch">الأقرب للاكتمال</button><button class="tab" data-p="health">صحة الاستراتيجيات</button></div><div id="paper" class="pane active"><div class="grid">${r.paperCandidates?.length?r.paperCandidates.map(x=>candidate(x,true)).join(''):empty('لا توجد إشارة اجتازت جميع الشروط الآن. لا يتم تخفيف البوابات لمجرد إظهار توصيات.')}</div></div><div id="watch" class="pane"><div class="grid">${r.conditionalWatch?.length?r.conditionalWatch.map(x=>candidate(x,false)).join(''):empty('لا توجد فرص مراقبة مؤهلة.')}</div></div><div id="health" class="pane"><table><thead><tr><th>الاستراتيجية</th><th>الحالة</th><th>صحة النموذج</th><th>حد القبول</th><th>ثبات النسخة</th><th>PF تاريخي</th><th>Average R</th><th>PF ورقي</th></tr></thead><tbody>${(h.strategies||[]).map(x=>`<tr><td>${E(x.strategyLabelAr)}</td><td>${E(x.statusLabelAr)}</td><td>${N(x.healthScore,1)}</td><td>${N(x.minimumAdaptivePaperScore,1)}</td><td>${N(x.variantStabilityPct,1)}%</td><td>${N(x.validationMetrics?.profitFactor,2)}</td><td>${N(x.validationMetrics?.averageR,2)}</td><td>${N(x.paperMetrics?.profitFactor,2)}</td></tr>`).join('')}</tbody></table></div></section><section class="section muted" style="padding:13px">${E(r.warningAr)}<br>أول تشغيل ينشئ خط أساس فقط ولا يسجل إشارات قديمة بأثر رجعي. تتحول الفرصة تلقائيًا إلى سجل التداول الورقي عند ظهورها في جلسة جديدة.</section>`;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.pane').forEach(e=>e.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.p).classList.add('active')})}
async function loadAll(){try{const [rr,hh]=await Promise.all([fetch(`../data/quant/adaptive-daily-recommendations.json?v=${Date.now()}`,{cache:'no-store'}),fetch(`../data/quant/strategy-health.json?v=${Date.now()}`,{cache:'no-store'})]);if(!rr.ok||!hh.ok)throw new Error('ملفات V13.5 لم تُنشأ بعد');render(await rr.json(),await hh.json())}catch(e){document.getElementById('app').innerHTML=`<section class="section empty"><h2>لم يتم تشغيل V13.5 بعد</h2><p>${E(e.message)}</p><p>شغّل Workflow: EGX Adaptive Calibration & Paper Tracker — V13.5</p></section>`}}
loadAll();
</script></body></html>
