<!doctype html>
<html lang="ar" dir="rtl">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>تحديث EGX Pro</title>
<body style="background:#061426;color:#fff;font-family:Arial;padding:30px;text-align:center">
<h2>جارٍ تحديث الأيقونة واللينك إلى V15.3…</h2>
<p id="s">مسح النسخ القديمة…</p>
<script>
(async()=>{
  try{
    if('serviceWorker' in navigator){
      const regs=await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r=>r.unregister()));
    }
    if('caches' in window){
      const keys=await caches.keys();
      await Promise.all(keys.map(k=>caches.delete(k)));
    }
    localStorage.clear();
    sessionStorage.clear();
    document.getElementById('s').textContent='تم المسح. يتم فتح النسخة الموحدة الآن…';
  }catch(e){
    document.getElementById('s').textContent='تمت المحاولة. يتم فتح النسخة الجديدة…';
  }
  setTimeout(()=>location.replace('./?app=pwa&v=15301&reset='+Date.now()),900);
})();
</script>
</body>
</html>
