name: Install & Run V13.5 Adaptive Paper

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-5-adaptive-paper
  cancel-in-progress: false

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.5 engine and pages
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYINSTALL'
          import base64
          import io
          import tarfile

          payload = ""
          allowed = ['scripts/quant/v13-5-adaptive-paper-tracker.cjs', 'scripts/quant/v13-5-acceptance.cjs', 'data/v13-5-adaptive-policy.json', 'preview-v13/adaptive-recommendations.html', 'preview-v13/paper-tracker.html']
          data = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected package members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PYINSTALL
          test -s scripts/quant/v13-5-adaptive-paper-tracker.cjs
          test -s scripts/quant/v13-5-acceptance.cjs
          test -s data/v13-5-adaptive-policy.json
          test "$(wc -c < preview-v13/adaptive-recommendations.html)" -gt 5000
          test "$(wc -c < preview-v13/paper-tracker.html)" -gt 5000

      - name: Validate V13.4 dependencies and database
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-4-acceptance.cjs
            data/v13-4-quant-policy.json
            data/symbol-map.json
            data/history-summary.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required V13.4 file: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }
          test "$(find data/history -maxdepth 1 -name '*.json' | wc -l)" -gt 0
          node --check scripts/quant/v13-4-quant-engine.cjs
          node --check scripts/quant/v13-5-adaptive-paper-tracker.cjs
          node --check scripts/quant/v13-5-acceptance.cjs

      - name: Refresh V13.4 and run V13.5
        shell: bash
        run: |
          set -euo pipefail
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-4-acceptance.cjs
          node scripts/quant/v13-5-adaptive-paper-tracker.cjs
          node scripts/quant/v13-5-acceptance.cjs

      - name: Commit V13.5 installation and outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/quant/v13-5-adaptive-paper-tracker.cjs \
            scripts/quant/v13-5-acceptance.cjs \
            data/v13-5-adaptive-policy.json \
            data/quant \
            preview-v13/adaptive-recommendations.html \
            preview-v13/paper-tracker.html
          if git diff --cached --quiet; then
            echo "V13.5 is already installed and current."
          else
            git commit -m "Install V13.5 adaptive strategy calibration and paper tracker"
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.5 pages
        id: deployment
        uses: actions/deploy-pages@v4
