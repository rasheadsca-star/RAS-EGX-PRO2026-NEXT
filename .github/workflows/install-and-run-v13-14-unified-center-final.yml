name: Install & Run V13.15.2 Technical Ranking Restore

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - intraday
          - postclose
          - install_only
  push:
    paths:
      - ".github/workflows/install-and-run-v13-14-unified-center-final.yml"
  schedule:
    - cron: "*/15 6-18 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-v13-15-2-technical-ranking-restore
  cancel-in-progress: true

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.15.2 without changing the V13 structure
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile, shutil
          from pathlib import Path

          payload = ''
          targets = ['data/v13-14-unified-center-policy.json', 'data/v13-15-evidence-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/unified-decision-center.html', 'scripts/postclose/v13-14-session-finalizer.cjs', 'scripts/quant/v13-14-unified-center.cjs', 'scripts/quant/v13-14-acceptance.cjs', 'scripts/evidence/v13-15-paper-ledger.cjs', 'scripts/evidence/v13-15-strategy-health.cjs', 'scripts/evidence/v13-15-evidence-acceptance.cjs']
          backup = Path("backups/v13-15-2-technical-ranking-restore")
          backup.mkdir(parents=True, exist_ok=True)

          for rel in targets:
              source = Path(rel)
              if source.exists():
                  destination = backup / rel
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  if not destination.exists():
                      shutil.copy2(source, destination)

          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              members = archive.getmembers()
              names = [member.name for member in members]
              unexpected = sorted(set(names) - set(targets))
              if unexpected:
                  raise SystemExit(f"Unexpected payload files: {unexpected}")
              archive.extractall(".")

          for rel in targets:
              if not Path(rel).exists():
                  raise SystemExit(f"Missing installed file: {rel}")
          print("V13.15.2 payload installed; previous target files preserved.")
          PY

      - name: Validate installed JavaScript and UI
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/postclose/v13-14-session-finalizer.cjs
          node --check scripts/quant/v13-14-unified-center.cjs
          node --check scripts/quant/v13-14-acceptance.cjs
          node --check scripts/evidence/v13-15-paper-ledger.cjs
          node --check scripts/evidence/v13-15-strategy-health.cjs
          node --check scripts/evidence/v13-15-evidence-acceptance.cjs
          python3 - <<'PY'
          import re
          from pathlib import Path
          for source, target in [
              ("preview-v13/app/index.html", "/tmp/v1315-index.js"),
              ("preview-v13/app/unified-decision-center.html", "/tmp/v1315-center.js"),
          ]:
              text = Path(source).read_text(encoding="utf-8")
              blocks = re.findall(r"<script[^>]*>(.*?)</script>", text, flags=re.S)
              Path(target).write_text("\n".join(blocks), encoding="utf-8")
          PY
          node --check /tmp/v1315-index.js
          node --check /tmp/v1315-center.js
          grep -q "V13.15" preview-v13/app/index.html
          grep -q "سجل غير قابل للتعديل" preview-v13/app/unified-decision-center.html
          echo "V13.15.2 INSTALL VALIDATION PASSED"

      - name: Resolve Cairo mode
        id: mode
        shell: bash
        env:
          REQUESTED_MODE: ${{ inputs.mode || 'auto' }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const requested = String(process.env.REQUESTED_MODE || 'auto');
          const parts = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Africa/Cairo', weekday: 'long', year: 'numeric', month: '2-digit',
            day: '2-digit', hour: '2-digit', minute: '2-digit', hourCycle: 'h23'
          }).formatToParts(new Date()).reduce((a,p)=>(a[p.type]=p.value,a),{});
          const date = `${parts.year}-${parts.month}-${parts.day}`;
          const minute = Number(parts.hour) * 60 + Number(parts.minute);
          const tradingDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday'].includes(parts.weekday);
          const intraday = tradingDay && minute >= 9*60+45 && minute <= 14*60+45;
          const postclose = tradingDay && minute >= 15*60 && minute <= 20*60+30;
          let mode;
          if (requested === 'auto') mode = intraday ? 'intraday' : postclose ? 'postclose' : 'skip';
          else if (requested === 'install_only') mode = 'install_only';
          else mode = requested;
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `mode=${mode}\ncairo_date=${date}\n`);
          console.log({ cairo: `${parts.weekday} ${parts.hour}:${parts.minute}`, mode });
          NODE

      - name: Confirm existing V13 dependencies
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/collect-market-gateway.js
            scripts/history/v13-10-full-market-refresh.cjs
            scripts/history/history-summary-builder.cjs
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-9-recommendation-audit.cjs
            scripts/quant/v13-10-tiered-confidence.cjs
            scripts/quant/v13-7-stock-intelligence.cjs
            scripts/quant/v13-8-portfolio-risk.cjs
            scripts/quant/v13-11-daily-decision.cjs
            scripts/intraday/v13-12-intraday-monitor.cjs
            scripts/quant/v13-13-live-rerank.cjs
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            scripts/evidence/v13-15-paper-ledger.cjs
            scripts/evidence/v13-15-strategy-health.cjs
            scripts/evidence/v13-15-evidence-acceptance.cjs
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Refresh public market snapshot
        if: steps.mode.outputs.mode == 'intraday' || steps.mode.outputs.mode == 'postclose'
        env:
          EGX_FETCH_TIMEOUT_MS: "360000"
          EGX_SOURCE_FETCH_TIMEOUT_MS: "45000"
          EGX_GATEWAY_FULL_ROWS: "180"
          EGX_GATEWAY_CONDITIONAL_ROWS: "100"
        run: node scripts/collect-market-gateway.js

      - name: Intraday pipeline
        if: steps.mode.outputs.mode == 'intraday'
        run: |
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INTRADAY node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs

      - name: First post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose'
        id: final1
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Refresh full history after incomplete coverage
        if: steps.mode.outputs.mode == 'postclose' && steps.final1.outcome == 'failure'
        continue-on-error: true
        env:
          V13_10_SKIP_FETCH: "false"
        run: node scripts/history/v13-10-full-market-refresh.cjs

      - name: Second post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose' && steps.final1.outcome == 'failure'
        id: final2
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Resolve finalization
        if: steps.mode.outputs.mode == 'postclose'
        id: final_status
        shell: bash
        env:
          FINAL1: ${{ steps.final1.outcome }}
          FINAL2: ${{ steps.final2.outcome }}
        run: |
          if [ "$FINAL1" = "success" ] || [ "$FINAL2" = "success" ]; then
            echo "finalized=true" >> "$GITHUB_OUTPUT"
          else
            echo "finalized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild confirmed daily decision and evidence
        if: steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized == 'true'
        run: |
          node scripts/history/history-summary-builder.cjs
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-10-tiered-confidence.cjs
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs
          node scripts/quant/v13-11-daily-decision.cjs
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=POSTCLOSE_CONFIRMED node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs

      - name: Publish clearly provisional evidence center
        if: steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized != 'true'
        run: |
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=PROVISIONAL node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs

      - name: Build V13.15.2 technical ranking and evidence core
        if: steps.mode.outputs.mode == 'install_only'
        run: |
          if [ -f data/intraday/latest.json ] && [ -f data/quant/daily-decision-workspace-v13-11.json ]; then
            node scripts/quant/v13-13-live-rerank.cjs || true
          fi
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INSTALL node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs

      - name: Confirm core safety
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          grep -q '"liveExecutionEnabled": false' data/v13-15-evidence-policy.json
          grep -q '"automaticOrderSubmission": false' data/v13-15-evidence-policy.json
          test -f data/evidence/paper-signals-v13-15.json
          test -f data/quant/strategy-health-v13-15.json
          echo "V13.15.2 SAFETY AND EVIDENCE GATES PASSED"

      - name: Keep stable root and PWA files isolated
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1315-changes.txt
          if grep -E '^(index\.html|service-worker\.js|manifest\.json|assets/|js/|css/)' /tmp/v1315-changes.txt; then
            echo "Safety stop: stable root/PWA files were changed."
            exit 1
          fi

      - name: Commit V13.15 files and evidence outputs
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths=(
            .github/workflows/install-and-run-v13-14-unified-center-final.yml
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            scripts/evidence
            data/v13-14-unified-center-policy.json
            data/v13-15-evidence-policy.json
            data/evidence
            data/history
            data/history-summary.json
            data/history-last-run.json
            data/history-batch-state.json
            data/history-errors.json
            data/source-audit.json
            data/session-calendar.json
            data/corporate-actions.json
            data/market.json
            data/last-good-market.json
            data/source-health.json
            data/source-fetch-report.json
            data/fetch-status.json
            data/source-gateway-report.json
            data/source-alerts.json
            data/intraday
            data/postclose
            data/quant
            preview-v13/app/index.html
            preview-v13/app/unified-decision-center.html
            backups/v13-15-2-technical-ranking-restore
          )
          for item in "${paths[@]}"; do
            if [ -e "$item" ]; then git add "$item"; fi
          done
          if git diff --cached --quiet; then
            echo "No V13.15 changes to commit."
          else
            git commit -m "Restore V13.15.2 technical ranking while keeping evidence safety"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        if: steps.mode.outputs.mode != 'skip'
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        if: steps.mode.outputs.mode != 'skip'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.15.2 attempt 1
        if: steps.mode.outputs.mode != 'skip'
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 2
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy V13.15.2 attempt 2
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 3
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180

      - name: Deploy V13.15.2 attempt 3
        if: steps.mode.outputs.mode != 'skip' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deploy3
        uses: actions/deploy-pages@v4
