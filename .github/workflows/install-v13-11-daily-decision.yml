name: Install & Run V13.11 Daily Decision Workspace

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-11-daily-decision.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-11-daily-decision
  cancel-in-progress: false

jobs:
  install-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.11 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/quant/v13-11-daily-decision.cjs', 'scripts/quant/v13-11-acceptance.cjs', 'data/v13-11-daily-decision-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/daily-decision.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate V13.11 dependencies
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/quant/v13-7-stock-intelligence.cjs
            scripts/quant/v13-8-portfolio-risk.cjs
            data/v13-7-native-policy.json
            data/v13-8-risk-policy.json
            data/quant/tiered-confidence-recommendations-v13-10.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing dependency: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Rebuild stock and risk data
        run: |
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs

      - name: Build and test V13.11
        run: |
          node scripts/quant/v13-11-daily-decision.cjs
          node scripts/quant/v13-11-acceptance.cjs

      - name: Confirm stable V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1311-install-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v1311-install-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.11
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/quant/v13-11-daily-decision.cjs             scripts/quant/v13-11-acceptance.cjs             data/v13-11-daily-decision-policy.json             data/quant/stocks             data/quant/stock-intelligence-index.json             data/quant/portfolio-risk-universe.json             data/quant/daily-decision-workspace-v13-11.json             preview-v13/app/index.html             preview-v13/app/daily-decision.html
          if git diff --cached --quiet; then
            echo "V13.11 is already current."
          else
            git commit -m "Install V13.11 daily decision workspace"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.11 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait for active Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 120

      - name: Deploy V13.11 attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
