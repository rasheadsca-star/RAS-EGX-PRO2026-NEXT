name: Install EGX PWA Icon Audit

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/install-egx-pwa-icon-audit.yml'

permissions:
  contents: write

jobs:
  install-audit-page:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write audit page to repository root
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          from pathlib import Path

          data = ''
          target = Path('egx-pwa-icon-audit.html')
          target.write_bytes(base64.b64decode(data))
          print('WROTE', target, target.stat().st_size)
          PY

      - name: Validate audit page
        run: |
          set -euo pipefail
          test -f egx-pwa-icon-audit.html
          grep -q 'EGX PWA Snapshot Auditor' egx-pwa-icon-audit.html
          grep -q 'readOnly: true' egx-pwa-icon-audit.html
          echo 'AUDIT PAGE VALIDATION PASSED'

      - name: Commit audit page
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add egx-pwa-icon-audit.html
          if git diff --cached --quiet; then
            echo "Audit page already exists."
          else
            git commit -m "Add read-only PWA icon audit page"
            git pull --rebase -X ours origin main
            git push origin main
          fi

      - name: Completion
        run: |
          echo "AUDIT PAGE INSTALLED"
          echo "Wait for pages-build-deployment, then open:"
          echo "https://rasheadsca-star.github.io/RAS-EGX0.1/egx-pwa-icon-audit.html?v=1"
