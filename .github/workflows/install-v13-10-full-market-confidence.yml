name: Install & Run V13.10 Full-Market Confidence

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-10-full-market-confidence.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-10-full-market-confidence
  cancel-in-progress: false

jobs:
  install-refresh-analyze-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.10 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/history/v13-10-full-market-refresh.cjs', 'scripts/quant/v13-10-tiered-confidence.cjs', 'scripts/quant/v13-10-acceptance.cjs', 'data/v13-10-tiered-confidence-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/tiered-confidence.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate V13.10 dependencies
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/history/historical-100-runner.cjs
            scripts/history/history-summary-builder.cjs
            scripts/history/adapters/yahoo-history-adapter.cjs
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-9-recommendation-audit.cjs
            data/v13-4-quant-policy.json
            data/v13-9-audit-calibration-policy.json
            data/symbol-map.json
            data/history-eligibility.json
            data/history-summary.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing dependency: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Refresh all market histories
        env:
          V13_10_SKIP_FETCH: "false"
        run: node scripts/history/v13-10-full-market-refresh.cjs

      - name: Rebuild strict and audit engines
        run: |
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs

      - name: Build and test V13.10
        run: |
          node scripts/quant/v13-10-tiered-confidence.cjs
          node scripts/quant/v13-10-acceptance.cjs

      - name: Confirm stable V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1310-install-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v1310-install-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.10
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/history/v13-10-full-market-refresh.cjs             scripts/quant/v13-10-tiered-confidence.cjs             scripts/quant/v13-10-acceptance.cjs             data/v13-10-tiered-confidence-policy.json             data/history             data/history-summary.json             data/history-last-run.json             data/history-batch-state.json             data/history-errors.json             data/source-audit.json             data/session-calendar.json             data/corporate-actions.json             data/quant             preview-v13/app/index.html             preview-v13/app/tiered-confidence.html
          if git diff --cached --quiet; then
            echo "V13.10 is already current."
          else
            git commit -m "Install V13.10 full-market freshness and tiered confidence"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.10 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait for active Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 120

      - name: Deploy V13.10 attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
