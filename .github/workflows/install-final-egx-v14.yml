          chmod +x scripts/*.js
          node scripts/install-final-egx-fix.js

      - name: Install Chromium collector
        run: |
          npm install --no-save --package-lock=false --no-audit --no-fund playwright@1.61.0
          npx playwright install --with-deps chromium

      - name: Fetch mandatory EGX market data
        run: npm run fetch

      - name: Fetch Mubasher primary feeds
        run: npm run mubasher:primary

      - name: Collect rendered Mubasher support and resistance
        run: npm run mubasher:sr:browser

      - name: Strict merge of verified support and resistance
        run: npm run mubasher:sr:merge

      - name: Rebuild history, reconciliation and rankings
        run: |
          node scripts/build-history-50-engine.js
          node scripts/build-price-reconciliation-report.js
          node scripts/build-final-opportunity-ranking.js
          node scripts/build-confidence-guard-report.js
          node scripts/build-daily-decision-brief.js

      - name: Build official decision
        run: npm run goal:decision

      - name: Stamp one atomic truth snapshot
        env:
          EGX_BUILD_ID: INSTALL-V14-${{ github.run_number }}-${{ github.run_attempt }}
        run: npm run truth:atomic

      - name: Final publish verification
        run: npm run verify:final

      - name: Upload audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egx-v14-install-audit-${{ github.run_number }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            artifacts/mubasher-support-resistance/
            data/support-resistance-browser-audit.json
            data/mubasher-support-resistance.json
            data/support-resistance-coverage.json
            data/runtime-truth.json
            data/final-truth-verification.json

      - name: Commit verified installation and remove installer
        if: success()
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f '.github/workflows/install-final-egx-v14.yml'
          files=(
            package.json index.html manifest.json service-worker.js truth-guard.js .gitignore
            scripts/collect-mubasher-support-resistance-browser.js
            scripts/merge-support-resistance-into-market.js
            scripts/build-atomic-runtime-truth.js
            scripts/verify-egx-final-state.js
            scripts/install-final-egx-fix.js
            .github/workflows/update-market-data.yml
            VERSION.json
            data/market.json
            data/recommendations.json
            data/final-opportunity-ranking.json
            data/final-multisource-ranking.json
            data/today-decision-center.json
            data/mubasher-primary-fields-report.json
            data/mubasher-support-resistance.json
            data/support-resistance-browser-audit.json
            data/support-resistance-coverage.json
            data/runtime-truth.json
            data/final-truth-verification.json
            data/history-50-engine.json
            data/price-reconciliation-report.json
            data/confidence-guard-report.json
            data/daily-decision-brief.json
          )
          for file in "${files[@]}"; do
            if [ -e "$file" ]; then git add "$file"; fi
          done
          git add -A '.github/workflows/install-final-egx-v14.yml'
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Install V14 atomic truth and strict Mubasher support resistance"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
