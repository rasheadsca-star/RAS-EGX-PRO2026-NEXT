name: Install EGX Final Truth V14

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/install-final-egx-v14.yml'

permissions:
  contents: write

concurrency:
  group: install-egx-final-truth-v14
  cancel-in-progress: false

env:
  TZ: Africa/Cairo
  EGX_MUBASHER_MIN_SR_COVERAGE: '80'
  EGX_MUBASHER_STALE_OK_HOURS: '36'
  EGX_SR_MAX_AGE_HOURS: '36'
  EGX_SR_MAX_PRICE_DRIFT_PCT: '20'
  EGX_SR_NAV_TIMEOUT_MS: '90000'
  EGX_SR_SETTLE_MS: '18000'

jobs:
  install-and-run:
    runs-on: ubuntu-latest
    timeout-minutes: 40
