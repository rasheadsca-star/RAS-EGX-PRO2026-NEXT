name: Repair V13.3 Final

on:
  push:
    paths:
      - ".github/workflows/repair-v133-final.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: repair-v133-final
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore V13.3 page
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p preview-v13
          python3 -c "import base64,gzip,pathlib; pathlib.Path('preview-v13/index.html').write_bytes(gzip.decompress(base64.b64decode('')))"
          test "$(wc -c < preview-v13/index.html)" -gt 5000
          grep -q "EGX Pro V13.3" preview-v13/index.html
          grep -q "v13-3-daily-production.json" preview-v13/index.html
          echo "V13.3 page restored successfully."

      - name: Commit repaired page
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview-v13/index.html
          if git diff --cached --quiet; then
            echo "Page already repaired."
          else
            git commit -m "Repair V13.3 preview page"
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
