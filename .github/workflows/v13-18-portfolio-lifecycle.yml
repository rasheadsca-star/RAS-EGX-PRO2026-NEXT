name: Install V13.18 Portfolio Lifecycle and Position Follow-up

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/v13-18-portfolio-lifecycle.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-v13-18-portfolio-installer
  cancel-in-progress: true

env:
  V13_18_PAYLOAD_SHA256: "e5ef3011753d14872e3cd4abda52fc1dc45889cbe00ac57c6caf22f3a411fe25"

jobs:
  install-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.18 portfolio lifecycle payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYINSTALL'
          import base64, hashlib, io, os, tarfile
          from pathlib import Path

          payload = ''
          raw = base64.b64decode(payload)
          actual = hashlib.sha256(raw).hexdigest()
          expected = os.environ['V13_18_PAYLOAD_SHA256']
          if actual != expected:
              raise SystemExit(f'Payload checksum mismatch: {actual} != {expected}')

          with tarfile.open(fileobj=io.BytesIO(raw), mode='r:gz') as archive:
              archive.extractall(Path('.'))

          required = [
              'scripts/ops/v13-18-portfolio-ui-patch.py',
              'scripts/ops/v13-18-production-workflow-patch.py',
              'scripts/ops/v13-18-portfolio-acceptance.py',
              'data/ops/v13-18-portfolio-policy.json',
          ]
          missing = [path for path in required if not Path(path).exists()]
          if missing:
              raise SystemExit('Missing V13.18 payload files: ' + ', '.join(missing))
          print(f'V13.18 payload installed and verified: sha256={actual}')
          PYINSTALL

      - name: Apply V13.18 portfolio and position lifecycle
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/v13-18-portfolio-ui-patch.py

      - name: Make V13.18 permanent in the production workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/v13-18-production-workflow-patch.py

      - name: Validate V13.18 portfolio lifecycle
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/v13-18-portfolio-acceptance.py
          grep -q "V13.18 — مركز القرار والمحفظة" preview-v13/app/unified-decision-center.html
          grep -q "محفظتي — متابعة الصفقات المفتوحة V13.18" preview-v13/app/unified-decision-center.html
          grep -q "V13_18_PORTFOLIO_REAPPLY" .github/workflows/v13-17-1-exact-fresh-production-universe.yml
          echo "V13.18 INSTALL VALIDATION PASSED"

      - name: Commit V13.18 portfolio lifecycle
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/ops/v13-18-portfolio-ui-patch.py             scripts/ops/v13-18-production-workflow-patch.py             scripts/ops/v13-18-portfolio-acceptance.py             data/ops/v13-18-portfolio-policy.json             preview-v13/app/index.html             preview-v13/app/unified-decision-center.html             .github/workflows/v13-17-1-exact-fresh-production-universe.yml
          if git diff --cached --quiet; then
            echo "V13.18 is already installed; no new commit required."
          else
            git commit -m "Add V13.18 portfolio lifecycle and open-position follow-up"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.18 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60

      - name: Deploy V13.18 attempt 2
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120

      - name: Deploy V13.18 attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deploy3
        uses: actions/deploy-pages@v4

      - name: Final V13.18 result
        shell: bash
        run: |
          set -euo pipefail
          echo "V13.18 PORTFOLIO LIFECYCLE INSTALLED"
          echo "Open positions persist independently from daily recommendation changes."
          echo "Automatic broker orders remain disabled."
