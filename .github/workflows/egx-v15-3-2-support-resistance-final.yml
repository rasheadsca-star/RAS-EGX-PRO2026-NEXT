name: EGX V15.3.2 Support Resistance Final

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: egx-v15-3-2-support-resistance-final
  cancel-in-progress: false

jobs:
  support-resistance-final:
    name: V15.3.2 SR Final
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      EGX_SR_MIN_ROWS: '60'
      EGX_SR_MIN_COVERAGE: '60'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install guaranteed V15.3.2 SR scripts
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64,pathlib
          files={
            'scripts/collect-mubasher-support-resistance-rendered.js':'',
            'scripts/merge-rendered-support-resistance.js':'',
            'scripts/verify-final-support-resistance.js':'',
          }
          for rel,data in files.items():
              p=pathlib.Path(rel);p.parent.mkdir(parents=True,exist_ok=True)
              p.write_bytes(base64.b64decode(data));print('INSTALLED',rel,p.stat().st_size)
          PY

      - name: Validate V15.3.2 runtime
        run: |
          set -euo pipefail
          node --check scripts/collect-mubasher-support-resistance-rendered.js
          node --check scripts/merge-rendered-support-resistance.js
          node --check scripts/verify-final-support-resistance.js
          test -f scripts/fetch-market-data.js
          test -f scripts/build-goal-integrated-decision.js
          echo 'V15.3.2 RUNTIME VALIDATION PASSED'

      - name: V15.3.2 Mandatory market collector
        run: node scripts/fetch-market-data.js

      - name: V15.3.2 Optional primary feed
        run: |
          set -u
          if [ -f scripts/collect-mubasher-primary-feeds.js ]; then
            node scripts/collect-mubasher-primary-feeds.js || echo '::warning::Primary layer failed; rendered S/R collection continues.'
          else
            echo '::notice::Primary feed script absent. This is allowed.'
          fi

      - name: Install Playwright Chromium
        run: |
          set -euo pipefail
          npm install --no-save --no-package-lock playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: V15.3.2 Collect rendered Mubasher support and resistance
        run: node scripts/collect-mubasher-support-resistance-rendered.js

      - name: V15.3.2 Merge verified support and resistance
        run: node scripts/merge-rendered-support-resistance.js

      - name: Rebuild ranking after verified support and resistance
        run: |
          set -euo pipefail
          [ ! -f scripts/build-history-50-engine.js ] || node scripts/build-history-50-engine.js
          [ ! -f scripts/build-price-reconciliation-report.js ] || node scripts/build-price-reconciliation-report.js
          [ ! -f scripts/build-final-opportunity-ranking.js ] || node scripts/build-final-opportunity-ranking.js
          [ ! -f scripts/build-confidence-guard-report.js ] || node scripts/build-confidence-guard-report.js

      - name: Rebuild GOAL decision from verified market
        run: node scripts/build-goal-integrated-decision.js

      - name: V15.3.2 FINAL SR VERIFICATION
        run: node scripts/verify-final-support-resistance.js

      - name: Upload SR diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: egx-v15-3-2-mubasher-sr-diagnostics
          path: |
            artifacts/mubasher-sr/
            data/mubasher-support-resistance-rendered.json
            data/support-resistance-verification.json
          if-no-files-found: warn
          retention-days: 7

      - name: Commit verified SR data and scripts
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/*.json scripts/collect-mubasher-support-resistance-rendered.js scripts/merge-rendered-support-resistance.js scripts/verify-final-support-resistance.js || true
          if git diff --cached --quiet; then
            echo 'No changes to commit.'
          else
            git commit -m 'Add verified Mubasher support resistance V15.3.2'
            git pull --rebase -X ours origin main
            git push origin main
          fi

      - name: V15.3.2 completed
        run: echo 'EGX V15.3.2 SUPPORT RESISTANCE FINAL COMPLETED'
