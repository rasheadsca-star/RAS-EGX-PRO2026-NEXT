name: Install & Run V13.8 Portfolio Risk

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-8-portfolio-risk.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-8-portfolio-risk
  cancel-in-progress: false

jobs:
  install-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.8 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/quant/v13-8-portfolio-risk.cjs', 'scripts/quant/v13-8-acceptance.cjs', 'data/v13-8-risk-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/risk-allocation.html', 'preview-v13/app/decision-journal.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate V13.7 dependency
        shell: bash
        run: |
          set -euo pipefail
          test -f data/quant/stock-intelligence-index.json || { echo "Run V13.7 first: stock-intelligence-index.json is missing."; exit 1; }
          test -d data/history || { echo "Missing data/history."; exit 1; }

      - name: Build and test V13.8
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/quant/v13-8-portfolio-risk.cjs
          node --check scripts/quant/v13-8-acceptance.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs
          node scripts/quant/v13-8-acceptance.cjs

      - name: Confirm stable V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v138-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v138-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.8
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/quant/v13-8-portfolio-risk.cjs             scripts/quant/v13-8-acceptance.cjs             data/v13-8-risk-policy.json             data/quant/portfolio-risk-universe.json             preview-v13/app/index.html             preview-v13/app/risk-allocation.html             preview-v13/app/decision-journal.html
          if git diff --cached --quiet; then
            echo "V13.8 is already current."
          else
            git commit -m "Install V13.8 portfolio risk and decision journal"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.8
        id: deployment
        uses: actions/deploy-pages@v4
