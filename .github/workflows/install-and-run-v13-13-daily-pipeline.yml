name: Install & Run V13.13 Daily Automatic Pipeline

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - intraday
          - postclose
  push:
    paths:
      - ".github/workflows/install-and-run-v13-13-daily-pipeline.yml"
  schedule:
    # Broad UTC window. Cairo-time logic below chooses intraday or post-close.
    - cron: "*/15 6-16 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-v13-13-daily-automatic-pipeline
  cancel-in-progress: true

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    environment:
      name: github-pages
      url: ${{ steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install or refresh V13.13 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/postclose/v13-13-session-consolidator.cjs', 'scripts/quant/v13-13-live-rerank.cjs', 'scripts/quant/v13-13-acceptance.cjs', 'data/v13-13-daily-pipeline-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/daily-decision.html', 'preview-v13/app/live-decision.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected archive members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Resolve Cairo run mode
        id: mode
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REQUESTED_MODE: ${{ inputs.mode || 'auto' }}
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const parts = new Intl.DateTimeFormat('en-GB', {
            timeZone: 'Africa/Cairo',
            weekday: 'long',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', hourCycle: 'h23'
          }).formatToParts(new Date()).reduce((a,x)=>(a[x.type]=x.value,a),{});
          const minute = Number(parts.hour) * 60 + Number(parts.minute);
          const tradingDay = ['Sunday','Monday','Tuesday','Wednesday','Thursday'].includes(parts.weekday);
          const intraday = tradingDay && minute >= 9*60+55 && minute <= 14*60+45;
          const postclose = tradingDay && minute >= 15*60 && minute <= 18*60;
          let mode = String(process.env.REQUESTED_MODE || 'auto').toLowerCase();
          if (process.env.EVENT_NAME !== 'workflow_dispatch' || mode === 'auto') {
            mode = intraday ? 'intraday' : postclose ? 'postclose' : 'install_only';
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `mode=${mode}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `cairo_date=${parts.year}-${parts.month}-${parts.day}\n`);
          console.log({ cairo: `${parts.weekday} ${parts.hour}:${parts.minute}`, tradingDay, intraday, postclose, mode });
          NODE

      - name: Validate dependencies
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/collect-market-gateway.js
            scripts/history/v13-10-full-market-refresh.cjs
            scripts/history/history-summary-builder.cjs
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-9-recommendation-audit.cjs
            scripts/quant/v13-10-tiered-confidence.cjs
            scripts/quant/v13-7-stock-intelligence.cjs
            scripts/quant/v13-8-portfolio-risk.cjs
            scripts/quant/v13-11-daily-decision.cjs
            scripts/intraday/v13-12-intraday-monitor.cjs
            scripts/postclose/v13-13-session-consolidator.cjs
            scripts/quant/v13-13-live-rerank.cjs
            scripts/quant/v13-13-acceptance.cjs
            data/v13-13-daily-pipeline-policy.json
            data/quant/daily-decision-workspace-v13-11.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Refresh public market snapshot
        if: steps.mode.outputs.mode != 'install_only'
        env:
          EGX_FETCH_TIMEOUT_MS: "360000"
          EGX_SOURCE_FETCH_TIMEOUT_MS: "45000"
          EGX_GATEWAY_FULL_ROWS: "150"
          EGX_GATEWAY_CONDITIONAL_ROWS: "80"
        run: node scripts/collect-market-gateway.js

      - name: Intraday monitor and live re-ranking
        if: steps.mode.outputs.mode == 'intraday'
        run: |
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          V13_13_ACCEPTANCE_MODE=INTRADAY node scripts/quant/v13-13-acceptance.cjs

      - name: Refresh full historical universe
        if: steps.mode.outputs.mode == 'postclose'
        env:
          V13_10_SKIP_FETCH: "false"
        run: node scripts/history/v13-10-full-market-refresh.cjs

      - name: Consolidate completed Cairo session
        if: steps.mode.outputs.mode == 'postclose'
        env:
          V13_13_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-13-session-consolidator.cjs

      - name: Rebuild daily history summary
        if: steps.mode.outputs.mode == 'postclose'
        run: node scripts/history/history-summary-builder.cjs

      - name: Rebuild complete decision pipeline
        if: steps.mode.outputs.mode == 'postclose'
        run: |
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-10-tiered-confidence.cjs
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs
          node scripts/quant/v13-11-daily-decision.cjs
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          V13_13_ACCEPTANCE_MODE=POSTCLOSE node scripts/quant/v13-13-acceptance.cjs

      - name: Build initial live ranking after installation
        if: steps.mode.outputs.mode == 'install_only'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f data/intraday/latest.json ]; then
            node scripts/quant/v13-13-live-rerank.cjs
            V13_13_ACCEPTANCE_MODE=INSTALL node scripts/quant/v13-13-acceptance.cjs
          else
            echo "No intraday snapshot yet; scheduled run will create it."
          fi

      - name: Confirm stable V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v1313-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v1313-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.13 files and outputs
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            scripts/postclose/v13-13-session-consolidator.cjs \
            scripts/quant/v13-13-live-rerank.cjs \
            scripts/quant/v13-13-acceptance.cjs \
            data/v13-13-daily-pipeline-policy.json \
            data/history \
            data/history-summary.json \
            data/history-last-run.json \
            data/history-batch-state.json \
            data/history-errors.json \
            data/source-audit.json \
            data/session-calendar.json \
            data/corporate-actions.json \
            data/market.json \
            data/last-good-market.json \
            data/source-health.json \
            data/source-fetch-report.json \
            data/fetch-status.json \
            data/source-gateway-report.json \
            data/source-alerts.json \
            data/intraday \
            data/postclose \
            data/quant \
            preview-v13/app/index.html \
            preview-v13/app/daily-decision.html \
            preview-v13/app/live-decision.html
          if git diff --cached --quiet; then
            echo "No V13.13 changes to commit."
          else
            git commit -m "Update V13.13 daily consolidation and live ranking"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.13 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait for active Pages deployment
        if: steps.deploy1.outcome == 'failure'
        run: sleep 120

      - name: Deploy V13.13 attempt 2
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        uses: actions/deploy-pages@v4
