name: Install & Run V13.9 Recommendation Audit

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-9-recommendation-audit.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-9-recommendation-audit
  cancel-in-progress: false

jobs:
  install-audit-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.9 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['scripts/quant/v13-4-quant-engine.cjs', 'scripts/quant/v13-9-recommendation-audit.cjs', 'scripts/quant/v13-9-acceptance.cjs', 'data/v13-9-audit-calibration-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/recommendation-audit.html']
          raw = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(raw), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY

      - name: Validate existing quant dependencies
        shell: bash
        run: |
          set -euo pipefail
          required=(
            data/v13-4-quant-policy.json
            data/history-summary.json
            data/history-eligibility.json
            data/symbol-map.json
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required dependency: $file"; exit 1; }
          done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Rebuild with corrected Maximum Drawdown
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/quant/v13-4-quant-engine.cjs
          node --check scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-9-acceptance.cjs

      - name: Confirm V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v139-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v139-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.9
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add             scripts/quant/v13-4-quant-engine.cjs             scripts/quant/v13-9-recommendation-audit.cjs             scripts/quant/v13-9-acceptance.cjs             data/v13-9-audit-calibration-policy.json             data/quant/feature-store.json             data/quant/market-regime.json             data/quant/strategy-backtests.json             data/quant/walk-forward-results.json             data/quant/recommendation-model.json             data/quant/daily-recommendations.json             data/quant/recommendation-audit.json             data/quant/recommendation-gate-trace-v13-9.json             data/quant/recommendation-engine-audit-v13-9.json             data/quant/calibrated-shadow-recommendations-v13-9.json             preview-v13/app/index.html             preview-v13/app/recommendation-audit.html
          if git diff --cached --quiet; then
            echo "V13.9 is already current."
          else
            git commit -m "Install V13.9 recommendation audit and calibration"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.9
        id: deployment
        uses: actions/deploy-pages@v4
