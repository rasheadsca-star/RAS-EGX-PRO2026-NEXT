name: EGX Historical 100 Sessions — V12.5 Cleanup & Fallback

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "cleanup_and_classify, salvage_identity, import_approved_fallback, batch_backfill, incremental_batch, retry_failed, repair_failed_batch, repair_symbol, build_map_only"
        required: true
        type: choice
        default: cleanup_and_classify
        options:
          - cleanup_and_classify
          - salvage_identity
          - import_approved_fallback
          - batch_backfill
          - incremental_batch
          - retry_failed
          - repair_failed_batch
          - repair_symbol
          - build_map_only
      batch_number:
        description: "1-based batch number; use 1 for cleanup/import"
        required: true
        default: "1"
        type: string
      batch_size:
        description: "Symbols per batch (recommended 20; maximum 25)"
        required: true
        default: "20"
        type: string
      ticker:
        description: "Ticker only when mode=repair_symbol"
        required: false
        type: string
      min_success:
        description: "Minimum valid files required when a fetch/import is performed"
        required: true
        default: "1"
        type: string
  schedule:
    - cron: "30 15 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-historical-update
  cancel-in-progress: false

jobs:
  history:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout main with history
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve run configuration
        id: run-config
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=incremental_auto" >> "$GITHUB_OUTPUT"
            echo "batch_number=1" >> "$GITHUB_OUTPUT"
            echo "batch_size=20" >> "$GITHUB_OUTPUT"
            echo "ticker=" >> "$GITHUB_OUTPUT"
            echo "min_success=1" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "batch_number=${{ inputs.batch_number }}" >> "$GITHUB_OUTPUT"
            echo "batch_size=${{ inputs.batch_size }}" >> "$GITHUB_OUTPUT"
            echo "ticker=${{ inputs.ticker }}" >> "$GITHUB_OUTPUT"
            echo "min_success=${{ inputs.min_success }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate V12.5 package and stable-app isolation
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/history/universe-cleanup-fallback.cjs
            scripts/history/approved-fallback-importer.cjs
            scripts/history/full-market-universe-builder.cjs
            scripts/history/failed-symbol-resolver.cjs
            scripts/history/historical-100-runner.cjs
            scripts/history/acceptance-tests.cjs
            scripts/history/history-summary-builder.cjs
            scripts/history/adapters/yahoo-history-adapter.cjs
            data/symbol-map.json
            data/history-verification-overrides.json
            data/history-fallback-import.json
            preview-v12/history-100.html
          )
          for file in "${required[@]}"; do
            test -f "$file" || { echo "Missing required file: $file"; exit 1; }
          done
          node --check scripts/history/universe-cleanup-fallback.cjs
          node --check scripts/history/approved-fallback-importer.cjs
          node --check scripts/history/full-market-universe-builder.cjs
          node --check scripts/history/historical-100-runner.cjs
          node --check scripts/history/adapters/yahoo-history-adapter.cjs
          echo "V11/V11.5 stable files remain outside the write allow-list."

      - name: Build or refresh full-market symbol map
        if: steps.run-config.outputs.mode == 'build_map_only' || steps.run-config.outputs.mode == 'batch_backfill' || steps.run-config.outputs.mode == 'incremental_batch' || steps.run-config.outputs.mode == 'retry_failed' || steps.run-config.outputs.mode == 'repair_failed_batch' || steps.run-config.outputs.mode == 'repair_symbol' || steps.run-config.outputs.mode == 'incremental_auto'
        env:
          HISTORY_UNIVERSE_MAX: "300"
        run: node scripts/history/full-market-universe-builder.cjs

      - name: Clean universe and classify unresolved symbols
        id: cleanup
        if: steps.run-config.outputs.mode == 'cleanup_and_classify' || steps.run-config.outputs.mode == 'salvage_identity'
        shell: bash
        run: |
          set -euo pipefail
          node scripts/history/universe-cleanup-fallback.cjs
          eligible_count=$(node -e "const r=require('./data/history-universe-cleanup-report.json'); process.stdout.write(String(r.counts?.eligible_guarded_salvage||0))")
          echo "eligible_count=$eligible_count" >> "$GITHUB_OUTPUT"
          echo "Guarded identity salvage candidates: $eligible_count"

      - name: Resolve failed Yahoo symbols
        id: repair-map
        if: steps.run-config.outputs.mode == 'repair_failed_batch'
        env:
          HISTORY_REPAIR_BATCH_NUMBER: ${{ steps.run-config.outputs.batch_number }}
          HISTORY_REPAIR_BATCH_SIZE: ${{ steps.run-config.outputs.batch_size }}
          HISTORY_REPAIR_DELAY_MS: "500"
        shell: bash
        run: |
          set -euo pipefail
          node scripts/history/failed-symbol-resolver.cjs
          resolved_count=$(node -e "const r=require('./data/history-symbol-repair-report.json'); process.stdout.write(String((r.resolvedTickers||[]).length))")
          echo "resolved_count=$resolved_count" >> "$GITHUB_OUTPUT"

      - name: Fetch and validate selected historical data
        if: (steps.run-config.outputs.mode == 'salvage_identity' && steps.cleanup.outputs.eligible_count != '0') || steps.run-config.outputs.mode == 'batch_backfill' || steps.run-config.outputs.mode == 'incremental_batch' || steps.run-config.outputs.mode == 'retry_failed' || steps.run-config.outputs.mode == 'repair_symbol' || steps.run-config.outputs.mode == 'incremental_auto' || (steps.run-config.outputs.mode == 'repair_failed_batch' && steps.repair-map.outputs.resolved_count != '0')
        env:
          HISTORY_MODE: ${{ steps.run-config.outputs.mode == 'salvage_identity' && 'retry_identity' || (steps.run-config.outputs.mode == 'repair_failed_batch' && 'retry_resolved' || steps.run-config.outputs.mode) }}
          HISTORY_TICKER: ${{ steps.run-config.outputs.ticker }}
          HISTORY_BATCH_NUMBER: ${{ steps.run-config.outputs.batch_number }}
          HISTORY_BATCH_SIZE: ${{ steps.run-config.outputs.batch_size }}
          HISTORY_REQUEST_CONCURRENCY: "3"
          HISTORY_BATCH_DELAY_MS: "1800"
          HISTORY_SYMBOL_DELAY_MS: "550"
        run: node scripts/history/historical-100-runner.cjs

      - name: Import administrator-approved fallback history
        if: steps.run-config.outputs.mode == 'import_approved_fallback'
        run: node scripts/history/approved-fallback-importer.cjs

      - name: Run acceptance tests after fetch or import
        if: (steps.run-config.outputs.mode == 'salvage_identity' && steps.cleanup.outputs.eligible_count != '0') || steps.run-config.outputs.mode == 'batch_backfill' || steps.run-config.outputs.mode == 'incremental_batch' || steps.run-config.outputs.mode == 'retry_failed' || steps.run-config.outputs.mode == 'repair_symbol' || steps.run-config.outputs.mode == 'incremental_auto' || steps.run-config.outputs.mode == 'import_approved_fallback' || (steps.run-config.outputs.mode == 'repair_failed_batch' && steps.repair-map.outputs.resolved_count != '0')
        env:
          HISTORY_MODE: ${{ steps.run-config.outputs.mode == 'salvage_identity' && 'retry_identity' || steps.run-config.outputs.mode }}
          HISTORY_TICKER: ${{ steps.run-config.outputs.ticker }}
          HISTORY_MIN_SUCCESS: ${{ steps.run-config.outputs.min_success }}
        run: node scripts/history/acceptance-tests.cjs

      - name: Build map-only summary
        if: steps.run-config.outputs.mode == 'build_map_only'
        shell: bash
        run: |
          set -euo pipefail
          node - <<'NODE'
          const path = require('path');
          const { readJson, writeJsonAtomic, nowIso } = require('./scripts/history/lib/utils.cjs');
          const { buildSummary, buildSessionCalendar } = require('./scripts/history/history-summary-builder.cjs');
          const root = process.cwd();
          const raw = readJson(path.join(root, 'data/symbol-map.json'), {});
          const entries = (Array.isArray(raw) ? raw : Object.values(raw)).filter((entry) => entry.active !== false);
          const summary = buildSummary(root, entries, {
            yahoo: { status: 'configured', role: 'historical backfill' },
            egx: { status: 'manual_or_approved_import', role: 'official verification' },
            mubasher: { status: 'existing_cache_or_approved_import', role: 'cross-check/fallback' },
            investing: { status: 'approved_import', role: 'fallback' },
          });
          buildSessionCalendar(root, summary);
          const batchSize = 20;
          writeJsonAtomic(path.join(root, 'data/history-batch-state.json'), {
            schemaVersion: '12.5.0', generatedAt: nowIso(), totalSymbols: entries.length,
            batchSize, totalBatches: Math.max(1, Math.ceil(entries.length / batchSize)),
            lastMode: 'build_map_only', lastBatchNumber: null, nextIncrementalBatch: 1,
          });
          writeJsonAtomic(path.join(root, 'data/history-last-run.json'), {
            schemaVersion: '12.5.0', generatedAt: nowIso(), mode: 'build_map_only',
            selectedTickers: [], coverageAfterRun: summary.coverage,
          });
          NODE

      - name: Enforce strict historical write isolation
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t changed < <(
            {
              git diff --name-only
              git diff --cached --name-only
              git ls-files --others --exclude-standard
            } | sed '/^$/d' | sort -u
          )

          echo "Changed files:"
          if [ "${#changed[@]}" -eq 0 ]; then echo "none"; else printf '%s\n' "${changed[@]}"; fi

          for file in "${changed[@]}"; do
            case "$file" in
              data/symbol-map.json|data/history-universe-report.json|data/history/*.json|data/history-summary.json|data/source-audit.json|data/history-errors.json|data/session-calendar.json|data/corporate-actions.json|data/history-batch-state.json|data/history-last-run.json|data/history-symbol-repair-report.json|data/history-universe-cleanup-report.json|data/history-fallback-queue.json|data/history-fallback-import-report.json)
                ;;
              *)
                echo "SAFETY STOP: forbidden changed path: $file"
                exit 1
                ;;
            esac
          done

          test -z "$(git diff --name-only -- index.html service-worker.js assets config preview-v12/index.html)"
          echo "Isolation passed. Stable application files were not touched."

      - name: Commit valid V12.5 history outputs only
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          allowed=(
            data/symbol-map.json
            data/history-universe-report.json
            data/history
            data/history-summary.json
            data/source-audit.json
            data/history-errors.json
            data/session-calendar.json
            data/corporate-actions.json
            data/history-batch-state.json
            data/history-last-run.json
            data/history-symbol-repair-report.json
            data/history-universe-cleanup-report.json
            data/history-fallback-queue.json
            data/history-fallback-import-report.json
          )
          for item in "${allowed[@]}"; do
            if [ -e "$item" ] || git ls-files --error-unmatch "$item" >/dev/null 2>&1; then
              git add -A -- "$item"
            fi
          done

          if git diff --cached --quiet; then
            echo "No valid V12.5 changes to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "V12.5 clean EGX universe and prepare verified fallbacks"
          git pull --rebase origin main
          git push origin HEAD:main
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Upload V12.5 diagnostic artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: v12-5-cleanup-fallback-${{ github.run_number }}
          if-no-files-found: ignore
          retention-days: 14
          path: |
            data/history-summary.json
            data/history-errors.json
            data/history-universe-report.json
            data/history-batch-state.json
            data/history-last-run.json
            data/history-symbol-repair-report.json
            data/history-universe-cleanup-report.json
            data/history-fallback-queue.json
            data/history-fallback-import-report.json

  deploy:
    needs: history
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload current repository to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V12.5 history preview
        id: deployment
        uses: actions/deploy-pages@v4
