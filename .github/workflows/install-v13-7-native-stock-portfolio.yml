name: Install & Run V13.7 Native Stock Portfolio

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-7-native-stock-portfolio.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-7-native-stock-portfolio
  cancel-in-progress: false

jobs:
  install-build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install V13.7 files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYI'
          import base64,io,tarfile
          payload=""
          allowed=['scripts/quant/v13-7-stock-intelligence.cjs', 'scripts/quant/v13-7-acceptance.cjs', 'data/v13-7-native-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/stock-analysis.html', 'preview-v13/app/portfolio.html']
          with tarfile.open(fileobj=io.BytesIO(base64.b64decode(payload)),mode='r:gz') as a:
              if a.getnames()!=allowed: raise SystemExit(f'Unexpected files: {a.getnames()}')
              for m in a.getmembers():
                  if m.name.startswith('/') or '..' in m.name.split('/'): raise SystemExit(f'Unsafe path: {m.name}')
              a.extractall('.')
          PYI
      - name: Build and validate V13.7
        run: |
          set -euo pipefail
          node --check scripts/quant/v13-7-stock-intelligence.cjs
          node --check scripts/quant/v13-7-acceptance.cjs
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-7-acceptance.cjs
      - name: Confirm V11 isolation
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v137-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v137-changes.txt; then echo 'Stable V11 file changed'; exit 1; fi
      - name: Commit V13.7
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/quant/v13-7-stock-intelligence.cjs scripts/quant/v13-7-acceptance.cjs data/v13-7-native-policy.json data/quant/stock-intelligence-index.json data/quant/stocks preview-v13/app/index.html preview-v13/app/stock-analysis.html preview-v13/app/portfolio.html
          if git diff --cached --quiet; then echo 'V13.7 already current'; else git commit -m 'Install V13.7 native stock analysis and portfolio'; git pull --rebase origin main; git push origin HEAD:main; fi
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload repository
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Deploy V13.7
        id: deployment
        uses: actions/deploy-pages@v4
