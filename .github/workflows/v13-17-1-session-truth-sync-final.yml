name: Install & Run V13.17.1 Final Session Truth Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - intraday
          - postclose
          - install_only
          - validate_only
  push:
    paths:
      - ".github/workflows/v13-17-1-session-truth-sync-final.yml"
  schedule:
    - cron: "*/15 6-18 * * 0-4"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  V13_17_1_PAYLOAD_SHA256: "3ece89ee5b85da4f5f922c059b73fd50049f8be07bba91441f793f693b8a2249"

concurrency:
  group: egx-v13-17-1-session-truth-sync-final
  cancel-in-progress: true

jobs:
  install-run-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.17.1 production hardening payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYINSTALL'
          import base64, io, tarfile, shutil, hashlib, os
          from pathlib import Path
          payload = ''
          targets = ['data/v13-14-unified-center-policy.json', 'data/v13-15-evidence-policy.json', 'data/v13-16-operational-policy.json', 'data/v13-17-1-production-policy.json', 'data/v13-17-intelligence-policy.json', 'preview-v13/app/index.html', 'preview-v13/app/unified-decision-center.html', 'scripts/collect-market-gateway.js', 'scripts/evidence/v13-15-evidence-acceptance.cjs', 'scripts/evidence/v13-15-paper-ledger.cjs', 'scripts/evidence/v13-15-strategy-health.cjs', 'scripts/lab/v13-16-shadow-diagnostics.cjs', 'scripts/lab/v13-17-momentum-money-flow.cjs', 'scripts/ops/v13-16-daily-report.cjs', 'scripts/ops/v13-16-operational-acceptance.cjs', 'scripts/ops/v13-16-operational-health.cjs', 'scripts/ops/v13-16-workflow-audit.cjs', 'scripts/ops/v13-17-1-install-source-fix.cjs', 'scripts/ops/v13-17-1-market-quality.cjs', 'scripts/ops/v13-17-1-production-gate.cjs', 'scripts/ops/v13-17-1-selftest.cjs', 'scripts/ops/v13-17-acceptance.cjs', 'scripts/postclose/v13-14-session-finalizer.cjs', 'scripts/quant/v13-14-acceptance.cjs', 'scripts/quant/v13-14-unified-center.cjs', 'scripts/quant/v13-17-market-search-index.cjs']
          raw = base64.b64decode(payload)
          actual = hashlib.sha256(raw).hexdigest()
          expected = os.environ['V13_17_1_PAYLOAD_SHA256']
          if actual != expected:
              raise SystemExit(f"Payload checksum mismatch: {actual} != {expected}")
          backup = Path('backups/v13-17-1-production-hardening')
          backup.mkdir(parents=True, exist_ok=True)
          for rel in targets:
              src = Path(rel)
              if src.exists():
                  dst = backup / rel
                  dst.parent.mkdir(parents=True, exist_ok=True)
                  if not dst.exists(): shutil.copy2(src, dst)
          with tarfile.open(fileobj=io.BytesIO(raw), mode='r:gz') as archive:
              names = [m.name for m in archive.getmembers()]
              unexpected = sorted(set(names) - set(targets))
              missing = sorted(set(targets) - set(names))
              if unexpected or missing:
                  raise SystemExit(f"Payload manifest mismatch unexpected={unexpected} missing={missing}")
              archive.extractall('.')
          for rel in targets:
              if not Path(rel).exists(): raise SystemExit(f"Missing installed file: {rel}")
          print(f"V13.17.1 payload installed and verified: {len(targets)} files, sha256={actual}")
          PYINSTALL

      - name: Permanently patch source quote parser
        run: |
          set -euo pipefail
          node scripts/ops/v13-17-1-install-source-fix.cjs
          node --check scripts/fetch-market-data.js
          grep -q "V13_17_1_QUOTE_WINDOW_PATCH" scripts/fetch-market-data.js

      - name: Permanently enable executable history summary rebuild
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYHISTORYCLI'
          from pathlib import Path
          file = Path('scripts/history/history-summary-builder.cjs')
          text = file.read_text(encoding='utf-8')
          marker = 'V13_17_1_HISTORY_SUMMARY_CLI_PATCH'
          if marker not in text:
              lines = [
                  '',
                  '',
                  '/* V13_17_1_HISTORY_SUMMARY_CLI_PATCH',
                  ' * Permanent CLI entry point: the original file exported functions only, so',
                  ' * `node scripts/history/history-summary-builder.cjs` silently did nothing.',
                  ' */',
                  'if (require.main === module) {',
                  "  const repoRoot = path.resolve(process.env.GITHUB_WORKSPACE || process.cwd());",
                  "  const rawMap = readJson(path.join(repoRoot, 'data', 'symbol-map.json'), {});",
                  '  const mapEntries = Array.isArray(rawMap)',
                  '    ? rawMap',
                  '    : Object.entries(rawMap || {}).map(([ticker, value]) => ({',
                  '        ...(value || {}),',
                  '        ticker: value?.ticker || ticker,',
                  '      }));',
                  '  const activeEntries = mapEntries.filter((entry) => entry?.ticker && entry.active !== false);',
                  '  const summary = buildSummary(repoRoot, activeEntries, {});',
                  '  const calendar = buildSessionCalendar(repoRoot, summary);',
                  '  console.log(',
                  '    `History summary rebuilt: symbols=${summary.symbolsTotal}, ` +',
                  "    `latest=${summary.latestMarketSession || 'none'}, ` +",
                  "    `calendar=${calendar.latestMarketSession || 'none'}`",
                  '  );',
                  '}',
              ]
              block = '\n'.join(lines)
              file.write_text(text.rstrip() + block + '\n', encoding='utf-8')
              print('Installed permanent history-summary CLI entry point.')
          else:
              print('History-summary CLI entry point already installed.')
          PYHISTORYCLI
          node --check scripts/history/history-summary-builder.cjs
          grep -q "V13_17_1_HISTORY_SUMMARY_CLI_PATCH" scripts/history/history-summary-builder.cjs

      - name: Permanently retire conflicting legacy schedulers
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYRETIRE'
          import json, shutil
          from pathlib import Path
          legacy = [
              '.github/workflows/v13-17-full-market-search-money-flow.yml',
              '.github/workflows/v13-17-1-production-data-integrity.yml',
              '.github/workflows/v13-17-1-finalization-integrity-hotfix.yml',
              '.github/workflows/egx-daily-production-v13-3.yml',
              '.github/workflows/V13_14_1_FIX.yml',
              '.github/workflows/install-and-run-v13-14-unified-center-final(1) (1).yml',
          ]
          backup = Path('backups/v13-17-1-production-hardening/retired-workflows')
          backup.mkdir(parents=True, exist_ok=True)
          retired = []
          for rel in legacy:
              source = Path(rel)
              if not source.exists():
                  continue
              destination = backup / source.name
              if not destination.exists():
                  shutil.copy2(source, destination)
              source.unlink()
              retired.append(rel)
          report = {
              'version': '13.17.1',
              'canonicalWorkflow': '.github/workflows/v13-17-1-session-truth-sync-final.yml',
              'retiredLegacySchedulers': legacy,
              'removedThisRun': retired,
              'backupDirectory': str(backup),
              'reason': 'Prevent older scheduled workflows from overwriting the active production-gated release.'
          }
          Path('data/v13-17-1-retired-workflows.json').write_text(json.dumps(report, indent=2) + '\n', encoding='utf-8')
          print(f'Legacy workflow retirement complete: removed={len(retired)}')
          PYRETIRE

      - name: Validate installed code and permanent safeguards
        shell: bash
        run: |
          set -euo pipefail
          syntax_targets=(
            scripts/fetch-market-data.js
            scripts/collect-market-gateway.js
            scripts/evidence/v13-15-evidence-acceptance.cjs
            scripts/evidence/v13-15-paper-ledger.cjs
            scripts/evidence/v13-15-strategy-health.cjs
            scripts/lab/v13-16-shadow-diagnostics.cjs
            scripts/lab/v13-17-momentum-money-flow.cjs
            scripts/ops/v13-16-daily-report.cjs
            scripts/ops/v13-16-operational-acceptance.cjs
            scripts/ops/v13-16-operational-health.cjs
            scripts/ops/v13-16-workflow-audit.cjs
            scripts/ops/v13-17-1-install-source-fix.cjs
            scripts/ops/v13-17-1-market-quality.cjs
            scripts/ops/v13-17-1-production-gate.cjs
            scripts/ops/v13-17-1-selftest.cjs
            scripts/ops/v13-17-acceptance.cjs
            scripts/history/history-summary-builder.cjs
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-acceptance.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-17-market-search-index.cjs
          )
          for file in "${syntax_targets[@]}"; do node --check "$file"; done
          python3 - <<'PYUI'
          import re
          from pathlib import Path
          for source, target in [
              ('preview-v13/app/index.html','/tmp/v13171-index.js'),
              ('preview-v13/app/unified-decision-center.html','/tmp/v13171-center.js')]:
              text=Path(source).read_text(encoding='utf-8')
              Path(target).write_text('\n'.join(re.findall(r'<script[^>]*>(.*?)</script>',text,flags=re.S)),encoding='utf-8')
          PYUI
          node --check /tmp/v13171-index.js
          node --check /tmp/v13171-center.js
          node scripts/ops/v13-17-1-selftest.cjs
          node scripts/history/history-summary-builder.cjs
          grep -q "V13_17_1_HISTORY_SUMMARY_CLI_PATCH" scripts/history/history-summary-builder.cjs
          grep -q "EGX Pro V13.17.1" preview-v13/app/index.html
          grep -q "V13.17.1 — مركز القرار الموحد" preview-v13/app/unified-decision-center.html
          grep -q "production-readiness-v13-17-1.json" preview-v13/app/unified-decision-center.html
          grep -q '"automaticBrokerOrders": false' data/v13-17-1-production-policy.json
          echo "V13.17.1 INSTALL AND PERMANENCE VALIDATION PASSED"

      - name: Resolve Cairo mode
        id: mode
        shell: bash
        env:
          REQUESTED_MODE: ${{ inputs.mode || '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          node - <<'NODE'
          const fs=require('fs');
          const eventName=String(process.env.EVENT_NAME||'');
          const requested=String(process.env.REQUESTED_MODE||(eventName==='push'?'install_only':'auto'));
          const p=new Intl.DateTimeFormat('en-GB',{timeZone:'Africa/Cairo',weekday:'long',year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',hourCycle:'h23'}).formatToParts(new Date()).reduce((a,x)=>(a[x.type]=x.value,a),{});
          const date=`${p.year}-${p.month}-${p.day}`, minute=Number(p.hour)*60+Number(p.minute);
          const tradingDay=['Sunday','Monday','Tuesday','Wednesday','Thursday'].includes(p.weekday);
          const intraday=tradingDay&&minute>=9*60+45&&minute<=14*60+45;
          const postclose=tradingDay&&minute>=15*60&&minute<=20*60+30;
          let mode=requested;
          if(requested==='auto')mode=intraday?'intraday':postclose?'postclose':'skip';
          fs.appendFileSync(process.env.GITHUB_OUTPUT,`mode=${mode}\ncairo_date=${date}\n`);
          console.log({cairo:`${p.weekday} ${p.hour}:${p.minute}`,mode,date});
          NODE

      - name: Confirm production dependencies
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          required=(
            scripts/fetch-market-data.js
            scripts/collect-market-gateway.js
            scripts/history/v13-10-full-market-refresh.cjs
            scripts/history/history-summary-builder.cjs
            scripts/quant/v13-4-quant-engine.cjs
            scripts/quant/v13-9-recommendation-audit.cjs
            scripts/quant/v13-10-tiered-confidence.cjs
            scripts/quant/v13-7-stock-intelligence.cjs
            scripts/quant/v13-8-portfolio-risk.cjs
            scripts/quant/v13-11-daily-decision.cjs
            scripts/intraday/v13-12-intraday-monitor.cjs
            scripts/quant/v13-13-live-rerank.cjs
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            scripts/evidence/v13-15-paper-ledger.cjs
            scripts/evidence/v13-15-strategy-health.cjs
            scripts/evidence/v13-15-evidence-acceptance.cjs
            scripts/ops/v13-17-1-market-quality.cjs
            scripts/ops/v13-17-1-production-gate.cjs
          )
          for file in "${required[@]}"; do test -f "$file" || { echo "Missing required file: $file"; exit 1; }; done
          test -d data/history || { echo "Missing data/history"; exit 1; }

      - name: Refresh and validate public market snapshot
        if: steps.mode.outputs.mode == 'intraday' || steps.mode.outputs.mode == 'postclose'
        id: quality
        continue-on-error: true
        shell: bash
        env:
          EGX_FETCH_TIMEOUT_MS: "360000"
          EGX_SOURCE_FETCH_TIMEOUT_MS: "45000"
          EGX_GATEWAY_FULL_ROWS: "180"
          EGX_GATEWAY_CONDITIONAL_ROWS: "100"
          EGX_GATEWAY_MIN_PRICE_VALID_PCT: "98"
          EGX_GATEWAY_MIN_OHLC_VALID_PCT: "80"
          EGX_GATEWAY_MIN_PARTIAL_OHLC_VALID_PCT: "65"
        run: |
          set -euo pipefail
          node scripts/collect-market-gateway.js
          if [ "${{ steps.mode.outputs.mode }}" = "postclose" ]; then
            node scripts/ops/v13-17-1-market-quality.cjs --mode=postclose
          else
            node scripts/ops/v13-17-1-market-quality.cjs --mode=intraday
          fi

      - name: Intraday production decision pipeline
        if: steps.mode.outputs.mode == 'intraday' && steps.quality.outcome == 'success'
        run: |
          set -euo pipefail
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INTRADAY node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs
          node scripts/ops/v13-16-workflow-audit.cjs
          node scripts/lab/v13-16-shadow-diagnostics.cjs
          node scripts/lab/v13-17-momentum-money-flow.cjs
          node scripts/quant/v13-17-market-search-index.cjs
          node scripts/ops/v13-16-operational-health.cjs
          node scripts/ops/v13-16-daily-report.cjs
          node scripts/ops/v13-16-operational-acceptance.cjs
          node scripts/ops/v13-17-acceptance.cjs

      - name: First post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose' && steps.quality.outcome == 'success'
        id: final1
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Refresh full history after incomplete coverage
        if: steps.mode.outputs.mode == 'postclose' && steps.quality.outcome == 'success' && steps.final1.outcome == 'failure'
        continue-on-error: true
        env:
          V13_10_SKIP_FETCH: "false"
        run: node scripts/history/v13-10-full-market-refresh.cjs

      - name: Second post-close finalization attempt
        if: steps.mode.outputs.mode == 'postclose' && steps.quality.outcome == 'success' && steps.final1.outcome == 'failure'
        id: final2
        continue-on-error: true
        env:
          V13_14_SESSION_DATE: ${{ steps.mode.outputs.cairo_date }}
        run: node scripts/postclose/v13-14-session-finalizer.cjs

      - name: Rebuild and verify finalized session truth
        if: steps.mode.outputs.mode == 'postclose' && steps.quality.outcome == 'success' && (steps.final1.outcome == 'success' || steps.final2.outcome == 'success')
        id: history_sync
        continue-on-error: true
        shell: bash
        env:
          V13_10_SKIP_FETCH: "true"
        run: |
          set -euo pipefail
          node scripts/history/history-summary-builder.cjs
          node scripts/history/v13-10-full-market-refresh.cjs
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('data/postclose/latest-v13-14.json', 'utf8'));
          const summary = JSON.parse(fs.readFileSync('data/history-summary.json', 'utf8'));
          const calendar = JSON.parse(fs.readFileSync('data/session-calendar.json', 'utf8'));
          const freshness = JSON.parse(fs.readFileSync('data/quant/freshness-coverage-v13-10.json', 'utf8'));

          if (!['FINALIZED', 'ALREADY_FINALIZED'].includes(report.status) || report.targetPassed !== true) {
            throw new Error(`Finalizer did not produce a confirmed session: ${report.status}`);
          }
          for (const [name, value] of [
            ['history summary', summary.latestMarketSession],
            ['session calendar', calendar.latestMarketSession],
            ['freshness coverage', freshness.latestMarketSession],
          ]) {
            if (value !== report.sessionDate) {
              throw new Error(`${name} mismatch: ${value} != ${report.sessionDate}`);
            }
          }

          const finalizedSymbols = (summary.symbols || []).filter((x) => x.lastSession === report.sessionDate).length;
          const exactFresh = Array.isArray(freshness.exactFreshTickers) ? freshness.exactFreshTickers.length : 0;
          if (finalizedSymbols < Number(report.minimumAcceptedSymbols || 100)) {
            throw new Error(`Only ${finalizedSymbols} summarized symbols reached ${report.sessionDate}`);
          }
          if (freshness.targetPassed !== true || exactFresh === 0) {
            throw new Error(
              `Freshness coverage is not production-ready: exact=${exactFresh}, ` +
              `coverage=${freshness.exactFreshCoveragePct}, targetPassed=${freshness.targetPassed}`
            );
          }

          console.log(
            `SESSION TRUTH SYNC PASSED: session=${report.sessionDate}, ` +
            `finalizedSymbols=${finalizedSymbols}, exactFresh=${exactFresh}, ` +
            `coverage=${freshness.exactFreshCoveragePct}%`
          );
          NODE

      - name: Resolve finalization
        if: steps.mode.outputs.mode == 'postclose'
        id: final_status
        shell: bash
        env:
          QUALITY: ${{ steps.quality.outcome }}
          FINAL1: ${{ steps.final1.outcome }}
          FINAL2: ${{ steps.final2.outcome }}
          HISTORY_SYNC: ${{ steps.history_sync.outcome }}
        run: |
          if [ "$QUALITY" = "success" ] && [ "$HISTORY_SYNC" = "success" ] && { [ "$FINAL1" = "success" ] || [ "$FINAL2" = "success" ]; }; then
            echo "finalized=true" >> "$GITHUB_OUTPUT"
          else
            echo "finalized=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild confirmed production decision and evidence
        if: steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized == 'true'
        run: |
          set -euo pipefail
          node scripts/history/history-summary-builder.cjs
          V13_10_SKIP_FETCH=true node scripts/history/v13-10-full-market-refresh.cjs
          node scripts/quant/v13-4-quant-engine.cjs
          node scripts/quant/v13-9-recommendation-audit.cjs
          node scripts/quant/v13-10-tiered-confidence.cjs
          node scripts/quant/v13-7-stock-intelligence.cjs
          node scripts/quant/v13-8-portfolio-risk.cjs
          node scripts/quant/v13-11-daily-decision.cjs
          node - <<'NODE'
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('data/postclose/latest-v13-14.json', 'utf8'));
          const freshness = JSON.parse(fs.readFileSync('data/quant/freshness-coverage-v13-10.json', 'utf8'));
          const tiered = JSON.parse(fs.readFileSync('data/quant/tiered-confidence-recommendations-v13-10.json', 'utf8'));
          const daily = JSON.parse(fs.readFileSync('data/quant/daily-decision-workspace-v13-11.json', 'utf8'));
          const expected = report.sessionDate;
          const values = {
            freshness: freshness.latestMarketSession,
            tiered: tiered.sessionId,
            daily: daily.sessionId,
          };
          for (const [name, value] of Object.entries(values)) {
            if (value !== expected) throw new Error(`${name} session mismatch: ${value} != ${expected}`);
          }
          console.log(
            `DECISION SESSION SYNC PASSED: session=${expected}, ` +
            `candidates=${daily.counts?.totalCandidates ?? 0}, ` +
            `status=${daily.dailyStatus}`
          );
          NODE
          node scripts/intraday/v13-12-intraday-monitor.cjs
          node scripts/quant/v13-13-live-rerank.cjs
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=POSTCLOSE_CONFIRMED node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs
          node scripts/ops/v13-16-workflow-audit.cjs
          node scripts/lab/v13-16-shadow-diagnostics.cjs
          node scripts/lab/v13-17-momentum-money-flow.cjs
          node scripts/quant/v13-17-market-search-index.cjs
          node scripts/ops/v13-16-operational-health.cjs
          node scripts/ops/v13-16-daily-report.cjs
          node scripts/ops/v13-16-operational-acceptance.cjs
          node scripts/ops/v13-17-acceptance.cjs

      - name: Publish safely gated provisional center
        if: (steps.mode.outputs.mode == 'postclose' && steps.final_status.outputs.finalized != 'true') || (steps.mode.outputs.mode == 'intraday' && steps.quality.outcome != 'success')
        shell: bash
        run: |
          set -u
          node scripts/intraday/v13-12-intraday-monitor.cjs || true
          node scripts/quant/v13-13-live-rerank.cjs || true
          node scripts/quant/v13-14-unified-center.cjs || true
          node scripts/evidence/v13-15-paper-ledger.cjs || true
          node scripts/evidence/v13-15-strategy-health.cjs || true
          node scripts/quant/v13-14-unified-center.cjs || true
          node scripts/ops/v13-16-workflow-audit.cjs || true
          node scripts/lab/v13-16-shadow-diagnostics.cjs || true
          node scripts/lab/v13-17-momentum-money-flow.cjs || true
          node scripts/quant/v13-17-market-search-index.cjs || true
          node scripts/ops/v13-16-operational-health.cjs || true
          node scripts/ops/v13-16-daily-report.cjs || true

      - name: Build V13.17.1 install-only production center
        if: steps.mode.outputs.mode == 'install_only' || steps.mode.outputs.mode == 'validate_only'
        shell: bash
        run: |
          set -euo pipefail
          if [ -f data/intraday/latest.json ] && [ -f data/quant/daily-decision-workspace-v13-11.json ]; then node scripts/quant/v13-13-live-rerank.cjs || true; fi
          node scripts/quant/v13-14-unified-center.cjs
          node scripts/evidence/v13-15-paper-ledger.cjs
          node scripts/evidence/v13-15-strategy-health.cjs
          node scripts/quant/v13-14-unified-center.cjs
          V13_14_ACCEPTANCE_MODE=INSTALL node scripts/quant/v13-14-acceptance.cjs
          node scripts/evidence/v13-15-evidence-acceptance.cjs
          node scripts/ops/v13-16-workflow-audit.cjs
          node scripts/lab/v13-16-shadow-diagnostics.cjs
          node scripts/lab/v13-17-momentum-money-flow.cjs
          node scripts/quant/v13-17-market-search-index.cjs
          node scripts/ops/v13-16-operational-health.cjs
          node scripts/ops/v13-16-daily-report.cjs
          node scripts/ops/v13-17-acceptance.cjs

      - name: Build production readiness gate
        if: steps.mode.outputs.mode != 'skip'
        run: node scripts/ops/v13-17-1-production-gate.cjs

      - name: Confirm permanent production safety
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          grep -q "V13_17_1_QUOTE_WINDOW_PATCH" scripts/fetch-market-data.js
          grep -q '"automaticBrokerOrders": false' data/v13-17-1-production-policy.json
          grep -q '"automaticOrderSubmission": false' data/v13-15-evidence-policy.json
          test -f data/production-readiness-v13-17-1.json
          test -f data/quant/market-search-index-v13-17.json
          test -f data/lab/momentum-money-flow-v13-17.json
          if [ "${{ steps.mode.outputs.mode }}" = "intraday" ] || [ "${{ steps.mode.outputs.mode }}" = "postclose" ]; then
            test -f data/market-quality-report.json
            test -f data/market-quality-acceptance-v13-17-1.json
          fi
          echo "V13.17.1 PRODUCTION-GATED SAFETY PASSED"

      - name: Keep stable root and PWA files isolated
        if: steps.mode.outputs.mode != 'skip'
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v13171-changes.txt
          if grep -E '^(index\.html|service-worker\.js|manifest\.json|assets/|js/|css/)' /tmp/v13171-changes.txt; then
            echo "Safety stop: stable root/PWA files were changed."
            exit 1
          fi

      - name: Commit V13.17.1 production hardening and outputs
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          paths=(
            scripts/fetch-market-data.js
            scripts/collect-market-gateway.js
            scripts/history/history-summary-builder.cjs
            scripts/postclose/v13-14-session-finalizer.cjs
            scripts/quant/v13-14-unified-center.cjs
            scripts/quant/v13-14-acceptance.cjs
            scripts/quant/v13-17-market-search-index.cjs
            scripts/evidence
            scripts/ops
            scripts/lab
            data/v13-14-unified-center-policy.json
            data/v13-15-evidence-policy.json
            data/v13-16-operational-policy.json
            data/v13-17-intelligence-policy.json
            data/v13-17-1-production-policy.json
            data/v13-17-1-retired-workflows.json
            data/market.json
            data/last-good-market.json
            data/market-quality-report.json
            data/market-quality-acceptance-v13-17-1.json
            data/production-readiness-v13-17-1.json
            data/quarantine
            data/source-health.json
            data/source-fetch-report.json
            data/fetch-status.json
            data/source-gateway-report.json
            data/source-alerts.json
            data/evidence
            data/ops
            data/reports
            data/lab
            data/history
            data/history-summary.json
            data/history-last-run.json
            data/history-batch-state.json
            data/history-errors.json
            data/source-audit.json
            data/session-calendar.json
            data/corporate-actions.json
            data/intraday
            data/postclose
            data/quant
            preview-v13/app/index.html
            preview-v13/app/unified-decision-center.html
            backups/v13-17-1-production-hardening
          )
          git add -A .github/workflows
          for item in "${paths[@]}"; do [ -e "$item" ] && git add "$item"; done
          if git diff --cached --quiet; then
            echo "No V13.17.1 changes to commit."
          else
            git commit -m "Synchronize V13.17.1 finalized session truth through daily decision"
            git pull --rebase -X ours origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only'
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.17.1 attempt 1
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only'
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 2
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only' && steps.deploy1.outcome == 'failure'
        run: sleep 90

      - name: Deploy V13.17.1 attempt 2
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only' && steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 3
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 180

      - name: Deploy V13.17.1 attempt 3
        if: steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'validate_only' && steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deploy3
        uses: actions/deploy-pages@v4

      - name: Enforce production result after diagnostics are published
        if: always() && steps.mode.outputs.mode != 'skip' && steps.mode.outputs.mode != 'install_only' && steps.mode.outputs.mode != 'validate_only'
        shell: bash
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          QUALITY: ${{ steps.quality.outcome }}
          FINALIZED: ${{ steps.final_status.outputs.finalized }}
        run: |
          set -euo pipefail
          if [ "$QUALITY" != "success" ]; then
            echo "Production gate blocked: market data quality did not pass. Diagnostics were committed and deployed."
            exit 1
          fi
          if [ "$MODE" = "postclose" ] && [ "$FINALIZED" != "true" ]; then
            echo "Production gate blocked: current session did not finalize. Provisional diagnostics were committed and deployed."
            exit 1
          fi
          echo "V13.17.1 PRODUCTION RUN PASSED"
