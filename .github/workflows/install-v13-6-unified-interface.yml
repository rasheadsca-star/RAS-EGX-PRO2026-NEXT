name: Install V13.6 Unified Operational Interface

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/install-v13-6-unified-interface.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: install-v13-6-unified-interface
  cancel-in-progress: false

jobs:
  install-validate-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install V13.6 workspace files
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64, io, tarfile
          payload = ""
          allowed = ['preview-v13/app/index.html', 'scripts/production/v13-6-workspace-acceptance.cjs', 'data/v13-6-workspace-policy.json']
          data = base64.b64decode(payload)
          with tarfile.open(fileobj=io.BytesIO(data), mode="r:gz") as archive:
              names = archive.getnames()
              if names != allowed:
                  raise SystemExit(f"Unexpected installer members: {names}")
              for member in archive.getmembers():
                  if member.name.startswith("/") or ".." in member.name.split("/"):
                      raise SystemExit(f"Unsafe path: {member.name}")
              archive.extractall(".")
          PY
          test -s preview-v13/app/index.html
          test -s scripts/production/v13-6-workspace-acceptance.cjs
          test -s data/v13-6-workspace-policy.json

      - name: Validate V13.6 workspace
        shell: bash
        run: |
          set -euo pipefail
          node --check scripts/production/v13-6-workspace-acceptance.cjs
          node scripts/production/v13-6-workspace-acceptance.cjs

      - name: Confirm V11 isolation
        shell: bash
        run: |
          set -euo pipefail
          git diff --name-only | tee /tmp/v136-changes.txt
          if grep -E '^(index\.html|service-worker\.js|assets/|js/|css/)' /tmp/v136-changes.txt; then
            echo "Safety stop: stable V11 files were changed."
            exit 1
          fi

      - name: Commit V13.6 workspace
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview-v13/app/index.html scripts/production/v13-6-workspace-acceptance.cjs data/v13-6-workspace-policy.json
          if git diff --cached --quiet; then
            echo "V13.6 files are already current."
          else
            git commit -m "Install V13.6 unified operational workspace"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.6 workspace
        id: deployment
        uses: actions/deploy-pages@v4
