name: Install V13.18 Portfolio Lifecycle — Permission-Safe

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/v13-18-portfolio-lifecycle-permission-safe.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: egx-v13-18-portfolio-permission-safe
  cancel-in-progress: true

env:
  V13_18_PAYLOAD_SHA256: "2de68057534180bf6540ba5de1d59aae44edafb9e4a6ccfccbf807cb8e734072"

jobs:
  install-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: github-pages
      url: ${{ steps.deploy3.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy1.outputs.page_url }}

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install permission-safe V13.18 payload
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PYINSTALL'
          import base64, hashlib, io, os, tarfile
          from pathlib import Path

          raw = base64.b64decode('')
          actual = hashlib.sha256(raw).hexdigest()
          expected = os.environ['V13_18_PAYLOAD_SHA256']
          if actual != expected:
              raise SystemExit(f'Payload checksum mismatch: {actual} != {expected}')

          with tarfile.open(fileobj=io.BytesIO(raw), mode='r:gz') as archive:
              archive.extractall(Path('.'))

          required = [
              'scripts/ops/v13-18-portfolio-ui-patch.py',
              'scripts/ops/v13-18-portfolio-acceptance.py',
              'data/ops/v13-18-portfolio-policy.json',
          ]
          missing = [item for item in required if not Path(item).exists()]
          if missing:
              raise SystemExit('Missing V13.18 payload files: ' + ', '.join(missing))
          print(f'Permission-safe V13.18 payload verified: sha256={actual}')
          PYINSTALL

      - name: Apply V13.18 portfolio lifecycle
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/v13-18-portfolio-ui-patch.py

      - name: Validate V13.18 UI and local portfolio engine
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/ops/v13-18-portfolio-acceptance.py --ui-only
          grep -q "V13.18 — مركز القرار والمحفظة" preview-v13/app/unified-decision-center.html
          grep -q "محفظتي — متابعة الصفقات المفتوحة V13.18" preview-v13/app/unified-decision-center.html
          grep -q "egx-v1318-portfolio-lifecycle" preview-v13/app/unified-decision-center.html
          echo "V13.18 PERMISSION-SAFE INSTALL VALIDATION PASSED"

      - name: Commit V13.18 application files only
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Deliberately do not stage or modify any .github/workflows file here.
          git add             scripts/ops/v13-18-portfolio-ui-patch.py             scripts/ops/v13-18-portfolio-acceptance.py             data/ops/v13-18-portfolio-policy.json             preview-v13/app/index.html             preview-v13/app/unified-decision-center.html

          if git diff --cached --quiet; then
            echo "V13.18 application files are already installed."
          else
            git commit -m "Install V13.18 portfolio lifecycle without workflow-token escalation"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Confirm no workflow file was included in the automated commit
        shell: bash
        run: |
          set -euo pipefail
          if git show --name-only --pretty="" HEAD | grep -q '^\.github/workflows/'; then
            echo "A workflow file was unexpectedly included in the automated commit."
            exit 1
          fi
          echo "V13.18 workflow-permission safety passed."

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload repository for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy V13.18 attempt 1
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 60

      - name: Deploy V13.18 attempt 2
        if: steps.deploy1.outcome == 'failure'
        id: deploy2
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Wait before deployment retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 120

      - name: Deploy V13.18 attempt 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        id: deploy3
        uses: actions/deploy-pages@v4

      - name: Final V13.18 permission-safe result
        shell: bash
        run: |
          set -euo pipefail
          echo "V13.18 PORTFOLIO LIFECYCLE INSTALLED"
          echo "V13.18 application commit did not modify GitHub workflow files."
          echo "Upload the separately supplied canonical production workflow manually for permanent reapplication."
          echo "Automatic broker orders remain disabled."
